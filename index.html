<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#5B7FFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Task Calendar</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #F2EEFF;
    --surface: #FFFFFF;
    --border: #E4DAFF;
    --text: #1D1640;
    --text-dim: #9389C0;
    --orange: #FF6B35;
    --blue: #5B7FFF;
    --pink: #FF5FA0;
    --yellow: #FFD166;
    --teal: #06D6A0;
    --coral: #FF6B6B;
    --purple: #8B5FCF;
    --radius: 16px;
    --header-gradient: linear-gradient(130deg, #5B7FFF 0%, #8B5FCF 52%, #FF5FA0 100%);
  }

  body.sport-mode {
    --bg: #F4FBF6;
    --surface: #FFFFFF;
    --border: #C8E8D4;
    --text: #1C2E22;
    --text-dim: #6A8C73;
    --blue: #4A9468;
    --purple: #3D8070;
    --pink: #D4724A;
    --header-gradient: linear-gradient(130deg, #4A9468 0%, #3D8070 52%, #C8683E 100%);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .app {
    max-width: 900px;
    margin: 0 auto;
    padding: 14px 14px 28px;
  }

  /* ── HEADER ────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    background: var(--header-gradient);
    border-radius: 20px;
    padding: 13px 16px;
    box-shadow: 0 6px 24px rgba(91,127,255,0.28);
  }

  .header h1 {
    font-size: 22px;
    font-weight: 900;
    color: #FFFFFF;
    letter-spacing: -0.3px;
    line-height: 1.15;
  }

  .header h1 span {
    font-weight: 700;
    color: rgba(255,255,255,0.68);
    margin-left: 5px;
    font-size: 18px;
  }

  .nav-btn {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    border: none;
    background: rgba(255,255,255,0.22);
    color: #FFFFFF;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.14s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.38); }
  .nav-btn:active { transform: scale(0.88); }

  .today-btn {
    background: rgba(255,255,255,0.24);
    border: none;
    color: #FFFFFF;
    font-family: 'Nunito', sans-serif;
    font-size: 10px;
    font-weight: 900;
    cursor: pointer;
    padding: 3px 9px;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    border-radius: 20px;
    margin-top: 3px;
    transition: background 0.14s;
    display: block;
    white-space: nowrap;
  }
  .today-btn:hover { background: rgba(255,255,255,0.4); }

  .header-center { text-align: center; }

  /* ── LAYOUT ────────────────────────────────────── */
  .layout {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .cal-side { flex: 1 1 0; min-width: 0; }
  .task-side { flex: 0 0 272px; }

  /* ── DAY LABELS ────────────────────────────────── */
  .day-labels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 5px;
  }

  .day-label {
    text-align: center;
    font-size: 10px;
    font-weight: 900;
    color: var(--text-dim);
    padding: 4px 0;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  /* ── CALENDAR GRID ─────────────────────────────── */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-cell {
    aspect-ratio: 1;
    border-radius: 11px;
    border: 2px solid transparent;
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: all 0.13s;
    position: relative;
    box-shadow: 0 1px 3px rgba(91,127,255,0.07);
  }
  .cal-cell:hover {
    border-color: var(--blue);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(91,127,255,0.18);
  }
  .cal-cell.today {
    background: var(--orange);
    color: #FFFFFF;
    border-color: transparent;
    box-shadow: 0 3px 14px rgba(255,107,53,0.42);
  }
  .cal-cell.selected {
    background: var(--blue);
    color: #FFFFFF;
    border-color: transparent;
    box-shadow: 0 4px 16px rgba(91,127,255,0.45);
    transform: translateY(-2px);
  }
  .cal-cell.today.selected {
    background: #E55A20;
    box-shadow: 0 4px 16px rgba(229,90,32,0.45);
  }
  .cal-cell.empty {
    background: transparent;
    cursor: default;
    box-shadow: none;
  }
  .cal-cell.empty:hover { transform: none; border-color: transparent; box-shadow: none; }

  .dot-row { display: flex; gap: 2px; height: 5px; }
  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }
  .cal-cell.selected .dot,
  .cal-cell.today .dot { filter: brightness(2) saturate(0.5); }

  /* ── TASK PANEL ────────────────────────────────── */
  .task-panel {
    background: var(--surface);
    border-radius: 20px;
    padding: 13px 13px 11px;
    position: sticky;
    top: 14px;
    border: 2px solid var(--border);
    box-shadow: 0 4px 20px rgba(91,127,255,0.1);
  }

  .task-panel-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 6px;
    margin-bottom: 10px;
  }

  .task-panel-head-left { min-width: 0; }

  .task-panel h2 {
    font-size: 15px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .task-date-sub {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 1px;
  }

  .task-count-badge {
    border-radius: 20px;
    padding: 3px 9px;
    font-size: 10px;
    font-weight: 900;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .task-count-badge.all-done { background: var(--teal); color: white; }
  .task-count-badge.some-done { background: var(--yellow); color: var(--text); }
  .task-count-badge.none-done { background: var(--coral); color: white; }
  .task-count-badge.zero { background: var(--border); color: var(--text-dim); }

  .task-input-row {
    display: flex;
    gap: 6px;
    margin-bottom: 9px;
  }

  .task-input {
    flex: 1;
    padding: 9px 11px;
    border-radius: 11px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    outline: none;
    transition: border-color 0.14s;
    min-width: 0;
  }
  .task-input:focus { border-color: var(--blue); }
  .task-input::placeholder { color: var(--text-dim); font-weight: 600; }

  .add-btn {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    border: none;
    background: linear-gradient(135deg, var(--orange) 0%, var(--pink) 100%);
    color: #fff;
    font-weight: 900;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(255,107,53,0.38);
    line-height: 1;
  }
  .add-btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
  .add-btn:active { transform: scale(0.88); }

  /* ── TASK LIST ─────────────────────────────────── */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 9px;
    background: var(--bg);
    border-radius: 11px;
    border: 2px solid transparent;
    border-left: 3px solid var(--blue);
    animation: fadeIn 0.17s ease;
    transition: border-color 0.13s, border-left-color 0.13s;
  }
  .task-item.task-done-item {
    border-left-color: var(--teal);
    opacity: 0.8;
  }
  .task-item:hover { border-color: var(--border); border-left-color: var(--blue); }
  .task-item.task-done-item:hover { border-left-color: var(--teal); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-3px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-btn {
    width: 21px;
    height: 21px;
    border-radius: 7px;
    border: 2.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #fff;
    font-weight: 900;
    transition: all 0.14s;
  }
  .check-btn:hover { border-color: var(--teal); }
  .check-btn.done {
    border: none;
    background: var(--teal);
    box-shadow: 0 2px 6px rgba(6,214,160,0.38);
  }

  .task-text {
    flex: 1;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
    word-break: break-word;
  }
  .task-text.done {
    text-decoration: line-through;
    color: var(--text-dim);
    font-weight: 600;
  }

  .del-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 15px;
    padding: 0 2px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.14s, color 0.14s;
    font-weight: 900;
    flex-shrink: 0;
  }
  .task-item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--coral); }

  .task-edit-input {
    flex: 1;
    padding: 5px 8px;
    border-radius: 8px;
    border: 2px solid var(--blue);
    background: var(--surface);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    outline: none;
    min-width: 0;
  }
  .task-item.editing { border-left-color: var(--blue); background: var(--surface); }

  /* ── EMPTY / PLACEHOLDER ───────────────────────── */
  .empty-state {
    text-align: center;
    padding: 14px 0;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 700;
  }
  .empty-state .icon { font-size: 22px; margin-bottom: 4px; }

  .placeholder-panel {
    background: var(--surface);
    border-radius: 20px;
    border: 2px solid var(--border);
    padding: 36px 20px;
    text-align: center;
    color: var(--text-dim);
    box-shadow: 0 4px 20px rgba(91,127,255,0.08);
  }
  .placeholder-panel .icon { font-size: 34px; margin-bottom: 10px; }
  .placeholder-panel p { font-size: 13px; font-weight: 800; line-height: 1.5; color: var(--text); }
  .placeholder-panel .sub { font-size: 11px; font-weight: 600; margin-top: 4px; color: var(--text-dim); }

  /* ── PENDING PANEL ─────────────────────────────── */
  .pending-bar { margin-bottom: 10px; }

  .pending-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 10px 16px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.14s;
    box-shadow: 0 2px 8px rgba(91,127,255,0.08);
    text-align: left;
  }
  .pending-btn:hover { border-color: var(--blue); }
  .pending-btn.active {
    background: var(--blue);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 16px rgba(91,127,255,0.35);
  }
  .pending-btn-label { flex: 1; }
  .pending-btn-count {
    background: var(--coral);
    color: #fff;
    border-radius: 20px;
    padding: 2px 9px;
    font-size: 11px;
    font-weight: 900;
    flex-shrink: 0;
  }
  .pending-btn.active .pending-btn-count { background: rgba(255,255,255,0.25); }
  .pending-btn-count.zero { background: var(--border); color: var(--text-dim); }

  .pending-panel {
    background: var(--surface);
    border-radius: 20px;
    border: 2px solid var(--border);
    padding: 12px 14px;
    margin-bottom: 10px;
    box-shadow: 0 4px 20px rgba(91,127,255,0.1);
    max-height: 420px;
    overflow-y: auto;
  }

  .pending-empty {
    text-align: center;
    padding: 22px 0 14px;
    color: var(--text-dim);
    font-weight: 700;
    font-size: 13px;
  }
  .pending-empty-icon { font-size: 30px; margin-bottom: 6px; }

  .pending-section-label {
    font-size: 9px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    color: var(--text-dim);
    padding: 8px 2px 5px;
  }
  .pending-section-label:first-child { padding-top: 2px; }

  .pending-group {
    background: var(--bg);
    border-radius: 12px;
    padding: 9px 11px;
    margin-bottom: 6px;
  }
  .pending-group:last-child { margin-bottom: 0; }

  .pending-date {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
    cursor: pointer;
  }
  .pending-date-label {
    font-size: 12px;
    font-weight: 900;
    color: var(--text);
    transition: color 0.13s;
  }
  .pending-date:hover .pending-date-label { color: var(--blue); }

  .pending-count-badge {
    background: var(--coral);
    color: #fff;
    border-radius: 20px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .pending-task-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-top: 1px solid var(--border);
  }
  .pending-task-text {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    line-height: 1.35;
    word-break: break-word;
  }

  /* ── SPORT MODE ─────────────────────────────────── */
  .sport-bar { display: flex; gap: 6px; margin-bottom: 10px; }

  .sport-btn {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 10px 16px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.14s;
    box-shadow: 0 2px 8px rgba(91,127,255,0.08);
    text-align: left;
  }
  .sport-btn:hover { border-color: var(--purple); }
  .sport-btn.active {
    background: linear-gradient(135deg, var(--purple) 0%, var(--blue) 100%);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 16px rgba(139,95,207,0.4);
  }
  .sport-btn-label { flex: 1; }

  .sport-settings-btn {
    width: 44px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.14s;
    flex-shrink: 0;
  }
  .sport-settings-btn:hover { border-color: var(--purple); }
  .sport-settings-btn.active { background: var(--purple); border-color: transparent; color: #fff; }

  .sport-settings-panel {
    background: var(--surface);
    border-radius: 20px;
    border: 2px solid var(--border);
    padding: 14px;
    margin-bottom: 10px;
    box-shadow: 0 4px 20px rgba(139,95,207,0.1);
  }

  .workout-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .workout-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border-radius: 11px;
    padding: 8px 10px;
  }
  .workout-name {
    flex: 1;
    font-size: 13px;
    font-weight: 800;
    color: var(--text);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .workout-days { display: flex; gap: 3px; flex-shrink: 0; flex-wrap: wrap; }
  .day-pill-static {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--purple);
    color: #fff;
    font-size: 9px;
    font-weight: 900;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .workout-del {
    background: none; border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px; font-weight: 900;
    padding: 0 2px; line-height: 1;
    flex-shrink: 0;
    transition: color 0.13s;
  }
  .workout-del:hover { color: var(--coral); }
  .workout-empty {
    text-align: center; color: var(--text-dim);
    font-size: 12px; font-weight: 700;
    padding: 6px 0 10px;
  }

  .add-workout { padding-top: 10px; border-top: 2px solid var(--border); }
  .add-workout-label {
    font-size: 10px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-dim); margin-bottom: 7px;
  }
  .day-picker { display: flex; gap: 5px; margin: 8px 0 10px; flex-wrap: wrap; }
  .day-pill {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg);
    display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 10px; font-weight: 900;
    cursor: pointer;
    transition: all 0.13s;
    color: var(--text-dim);
    user-select: none;
    font-family: 'Nunito', sans-serif;
  }
  .day-pill input[type="checkbox"] { display: none; }
  .day-pill:has(input:checked) { background: var(--purple); border-color: var(--purple); color: #fff; }

  .add-workout-btn {
    width: 100%; height: 38px;
    border-radius: 11px; border: none;
    background: linear-gradient(135deg, var(--purple) 0%, var(--blue) 100%);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 900;
    cursor: pointer;
    transition: filter 0.13s, transform 0.13s;
    box-shadow: 0 3px 10px rgba(139,95,207,0.38);
    margin-top: 2px;
  }
  .add-workout-btn:hover { filter: brightness(1.08); }
  .add-workout-btn:active { transform: scale(0.97); }

  .workout-interval-badge {
    background: var(--purple);
    color: #fff;
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 900;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .sport-btn-count {
    background: var(--purple);
    color: #fff;
    border-radius: 20px;
    padding: 2px 9px;
    font-size: 11px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .sched-type { display: flex; gap: 6px; margin: 8px 0 6px; }
  .sched-type-opt {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 7px 10px;
    border-radius: 10px;
    border: 2px solid var(--border);
    font-size: 11px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.13s;
    color: var(--text-dim);
    user-select: none;
    font-family: 'Nunito', sans-serif;
  }
  .sched-type-opt input { display: none; }
  .sched-type-opt:has(input:checked) { background: var(--purple); border-color: var(--purple); color: #fff; }

  .interval-row { display: flex; align-items: center; gap: 8px; margin: 6px 0 4px; flex-wrap: wrap; }
  .interval-input {
    width: 64px;
    padding: 7px 8px;
    border-radius: 9px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 900;
    text-align: center;
    outline: none;
  }
  .interval-input:focus { border-color: var(--purple); }
  .interval-label { font-size: 13px; font-weight: 800; color: var(--text); }
  .interval-date-input { margin-top: 6px; width: 100%; }

  /* ── MOBILE ────────────────────────────────────── */
  @media (max-width: 700px) {
    .layout { flex-direction: column; gap: 10px; }
    .cal-side { width: 100%; flex: none; }
    .task-side { width: 100%; flex: none; }
    .task-panel { position: static; }
    .app { padding: 10px 10px 22px; }
    .header { padding: 11px 13px; border-radius: 16px; margin-bottom: 11px; }
    .header h1 { font-size: 18px; }
    .header h1 span { font-size: 15px; }
    .nav-btn { width: 34px; height: 34px; font-size: 12px; }
    .cal-cell { font-size: 12px; border-radius: 9px; }
    .day-label { font-size: 9px; padding: 3px 0; }
    .cal-grid { gap: 3px; }
    .del-btn { opacity: 1; }
  }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function(){});
  // Auto-reload when a new service worker takes control (ensures home screen app always gets latest version)
  navigator.serviceWorker.addEventListener("controllerchange", function() {
    window.location.reload();
  });
}

var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
var DAYS_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var DAYS_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

var state = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  selectedDate: null,
  tasks: {},
  showPending: false,
  editingTask: null,
  sportMode: false,
  showSportSettings: false,
  workouts: [],
  workoutDone: {}
};

function loadTasks() {
  try {
    var saved = localStorage.getItem("task-calendar-data");
    if (saved) state.tasks = JSON.parse(saved);
  } catch(e) {}
}

function saveTasks() {
  try {
    localStorage.setItem("task-calendar-data", JSON.stringify(state.tasks));
  } catch(e) {}
}

function dateKey(y, m, d) {
  return y + "-" + String(m+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
}

function isToday(d) {
  var t = new Date();
  return d === t.getDate() && state.month === t.getMonth() && state.year === t.getFullYear();
}

function prevMonth() {
  if (state.month === 0) { state.month = 11; state.year--; } else state.month--;
  var n = new Date();
  state.selectedDate = (state.month === n.getMonth() && state.year === n.getFullYear()) ? n.getDate() : null;
  render();
}

function nextMonth() {
  if (state.month === 11) { state.month = 0; state.year++; } else state.month++;
  var n = new Date();
  state.selectedDate = (state.month === n.getMonth() && state.year === n.getFullYear()) ? n.getDate() : null;
  render();
}

function goToday() {
  var t = new Date();
  state.year = t.getFullYear();
  state.month = t.getMonth();
  state.selectedDate = t.getDate();
  render();
}

function selectDate(d) {
  state.selectedDate = d;
  render();
  // Prevent browser from auto-focusing the input (avoids keyboard popup on mobile)
  if (document.activeElement && document.activeElement !== document.body) {
    document.activeElement.blur();
  }
  if (window.innerWidth <= 700) {
    setTimeout(function() {
      var panel = document.querySelector(".task-panel");
      if (panel) panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }, 60);
  }
}

function addTask() {
  var input = document.getElementById("taskInput");
  var text = input.value.trim();
  if (!text || !state.selectedDate) return;
  var key = dateKey(state.year, state.month, state.selectedDate);
  if (!state.tasks[key]) state.tasks[key] = [];
  state.tasks[key].push({ text: text, done: false, id: Date.now() });
  saveTasks();
  input.value = "";
  render();
  setTimeout(function() {
    var el = document.getElementById("taskInput");
    if (el) el.focus();
    if (window.innerWidth <= 700) {
      var list = document.querySelector(".task-list");
      if (list && list.lastElementChild) {
        list.lastElementChild.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    }
  }, 60);
}

function toggleTask(key, id) {
  var list = state.tasks[key];
  if (!list) return;
  for (var i = 0; i < list.length; i++) {
    if (list[i].id === id) { list[i].done = !list[i].done; break; }
  }
  if (navigator.vibrate) navigator.vibrate(50);
  saveTasks();
  render();
}

/* ── swipe to change month ── */
var swipeStartX = 0, swipeStartY = 0;
function swipeTouchStart(e) {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
}
function swipeTouchEnd(e) {
  var dx = e.changedTouches[0].clientX - swipeStartX;
  var dy = e.changedTouches[0].clientY - swipeStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) nextMonth(); else prevMonth();
  }
}

/* ── long-press to edit task ── */
var longPressTimer = null;
function taskLongPressStart(key, id) {
  taskLongPressEnd();
  longPressTimer = setTimeout(function() {
    longPressTimer = null;
    if (navigator.vibrate) navigator.vibrate([30, 20, 30]);
    startEditTask(key, id);
  }, 500);
}
function taskLongPressEnd() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
}
function startEditTask(key, id) {
  state.editingTask = { key: key, id: id };
  render();
  setTimeout(function() {
    var el = document.getElementById('editInput');
    if (el) { el.focus(); el.select(); }
  }, 30);
}
function saveEditTask() {
  if (!state.editingTask) return;
  var el = document.getElementById('editInput');
  var text = el ? el.value.trim() : '';
  var key = state.editingTask.key;
  var id = state.editingTask.id;
  state.editingTask = null;
  if (text && state.tasks[key]) {
    for (var ei = 0; ei < state.tasks[key].length; ei++) {
      if (state.tasks[key][ei].id === id) { state.tasks[key][ei].text = text; break; }
    }
    saveTasks();
  }
  render();
}
function cancelEditTask() {
  state.editingTask = null;
  render();
}

/* ── sport mode ── */
function loadWorkouts() {
  try {
    var saved = localStorage.getItem("sport-workouts");
    if (saved) {
      var data = JSON.parse(saved);
      state.workouts = data.workouts || [];
      state.workoutDone = data.workoutDone || {};
    }
  } catch(e) {}
}
function saveWorkouts() {
  try {
    localStorage.setItem("sport-workouts", JSON.stringify({ workouts: state.workouts, workoutDone: state.workoutDone }));
  } catch(e) {}
}
function toggleSportMode() {
  state.sportMode = !state.sportMode;
  if (state.sportMode) {
    document.body.classList.add('sport-mode');
    if (state.workouts.length === 0) state.showSportSettings = true;
  } else {
    document.body.classList.remove('sport-mode');
    state.showSportSettings = false;
  }
  render();
}
function toggleSportSettings() {
  state.showSportSettings = !state.showSportSettings;
  render();
}
function addWorkout() {
  var nameEl = document.getElementById('workoutInput');
  var name = nameEl ? nameEl.value.trim() : '';
  if (!name) return;
  var intervalRadio = document.getElementById('schedInterval');
  var isInterval = intervalRadio && intervalRadio.checked;
  var workout;
  if (isInterval) {
    var nEl = document.getElementById('intervalDays');
    var n = nEl ? parseInt(nEl.value) : 2;
    if (!n || n < 1) n = 1;
    var startEl = document.getElementById('intervalStart');
    var startDate = (startEl && startEl.value) ? startEl.value : new Date().toISOString().split('T')[0];
    workout = { id: Date.now(), name: name, type: 'interval', intervalDays: n, startDate: startDate };
  } else {
    var days = [];
    for (var wi = 0; wi < 7; wi++) {
      var cb = document.getElementById('wd' + wi);
      if (cb && cb.checked) days.push(wi);
    }
    if (days.length === 0) return;
    workout = { id: Date.now(), name: name, type: 'weekly', days: days };
  }
  state.workouts.push(workout);
  saveWorkouts();
  render();
}
function deleteWorkout(id) {
  state.workouts = state.workouts.filter(function(w) { return w.id !== id; });
  saveWorkouts();
  render();
}
function toggleWorkoutDone(key, workoutId) {
  if (!state.workoutDone[key]) state.workoutDone[key] = [];
  var idx = state.workoutDone[key].indexOf(workoutId);
  if (idx === -1) state.workoutDone[key].push(workoutId);
  else state.workoutDone[key].splice(idx, 1);
  if (navigator.vibrate) navigator.vibrate(50);
  saveWorkouts();
  render();
}
function isWorkoutScheduledForDay(workout, year, month, day) {
  if (workout.type === 'interval') {
    var target = new Date(year, month, day);
    var sp = workout.startDate.split('-');
    var start = new Date(parseInt(sp[0]), parseInt(sp[1]) - 1, parseInt(sp[2]));
    var diffDays = Math.round((target - start) / 86400000);
    return diffDays >= 0 && diffDays % workout.intervalDays === 0;
  }
  var dow = new Date(year, month, day).getDay();
  return workout.days && workout.days.indexOf(dow) !== -1;
}

function toggleSchedType(type) {
  var ws = document.getElementById('weeklySection');
  var is = document.getElementById('intervalSection');
  if (ws) ws.style.display = type === 'weekly' ? '' : 'none';
  if (is) is.style.display = type === 'interval' ? '' : 'none';
}

function renderSportDayPanel() {
  if (!state.selectedDate) {
    return '<div class="placeholder-panel"><div class="icon">🏋️</div><p>Pick a day to see workouts</p><div class="sub">Tap any date on the calendar</div></div>';
  }
  var dow = new Date(state.year, state.month, state.selectedDate).getDay();
  var sKey = dateKey(state.year, state.month, state.selectedDate);
  var todayLbl = isToday(state.selectedDate) ? ' · Today' : '';
  var dayWorkouts = state.workouts.filter(function(w) { return isWorkoutScheduledForDay(w, state.year, state.month, state.selectedDate); });
  var doneList = state.workoutDone[sKey] || [];
  var doneCount = dayWorkouts.filter(function(w) { return doneList.indexOf(w.id) !== -1; }).length;
  var badgeClass = "task-count-badge zero", badgeText = "Rest day";
  if (dayWorkouts.length > 0) {
    badgeText = doneCount + "/" + dayWorkouts.length;
    if (doneCount === dayWorkouts.length) badgeClass = "task-count-badge all-done";
    else if (doneCount > 0) badgeClass = "task-count-badge some-done";
    else badgeClass = "task-count-badge none-done";
  }
  var items = "";
  if (dayWorkouts.length === 0) {
    items = '<div class="empty-state"><div class="icon">💤</div>Rest day — no workouts!</div>';
  } else {
    items = '<div class="task-list">';
    for (var si = 0; si < dayWorkouts.length; si++) {
      var sw = dayWorkouts[si];
      var isDone = doneList.indexOf(sw.id) !== -1;
      var cls = "task-item" + (isDone ? " task-done-item" : "");
      items +=
        '<div class="' + cls + '">' +
          '<button class="check-btn ' + (isDone ? 'done' : '') + '" onclick="toggleWorkoutDone(\'' + sKey + '\',' + sw.id + ')">' +
            (isDone ? '&#10003;' : '') + '</button>' +
          '<span class="task-text ' + (isDone ? 'done' : '') + '">' + escHtml(sw.name) + '</span>' +
        '</div>';
    }
    items += '</div>';
  }
  return '<div class="task-panel">' +
    '<div class="task-panel-head">' +
      '<div class="task-panel-head-left">' +
        '<h2>' + MONTHS[state.month] + ' ' + state.selectedDate + todayLbl + '</h2>' +
        '<div class="task-date-sub">' + DAYS_FULL[dow] + ' · 🏋️</div>' +
      '</div>' +
      '<span class="' + badgeClass + '">' + badgeText + '</span>' +
    '</div>' +
    items +
  '</div>';
}
function renderSportSettingsPanel() {
  var DL = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  var html = '<div class="sport-settings-panel">';
  if (state.workouts.length > 0) {
    html += '<div class="workout-list">';
    for (var ri = 0; ri < state.workouts.length; ri++) {
      var rw = state.workouts[ri];
      var schedBadge = '';
      if (rw.type === 'interval') {
        schedBadge = '<span class="workout-interval-badge">Every ' + rw.intervalDays + 'd</span>';
      } else {
        var pills = '';
        for (var rdi = 0; rdi < (rw.days || []).length; rdi++) pills += '<span class="day-pill-static">' + DL[rw.days[rdi]] + '</span>';
        schedBadge = '<div class="workout-days">' + pills + '</div>';
      }
      html += '<div class="workout-row">' +
        '<span class="workout-name">' + escHtml(rw.name) + '</span>' +
        schedBadge +
        '<button class="workout-del" onclick="deleteWorkout(' + rw.id + ')">&#215;</button>' +
      '</div>';
    }
    html += '</div>';
  } else {
    html += '<div class="workout-empty">No workouts yet — add one below!</div>';
  }
  var todayStr = new Date().toISOString().split('T')[0];
  var dayChecks = '';
  for (var di = 0; di < 7; di++) dayChecks += '<label class="day-pill"><input type="checkbox" id="wd' + di + '">' + DL[di] + '</label>';
  html +=
    '<div class="add-workout">' +
      '<div class="add-workout-label">Add New Workout</div>' +
      '<input id="workoutInput" class="task-input" placeholder="e.g. Six pack, Neck exercises..." onkeydown="if(event.key===\'Enter\')addWorkout()">' +
      '<div class="sched-type">' +
        '<label class="sched-type-opt"><input type="radio" name="sct" id="schedWeekly" checked onchange="toggleSchedType(\'weekly\')">📅 Weekdays</label>' +
        '<label class="sched-type-opt"><input type="radio" name="sct" id="schedInterval" onchange="toggleSchedType(\'interval\')">🔁 Every N days</label>' +
      '</div>' +
      '<div id="weeklySection"><div class="day-picker">' + dayChecks + '</div></div>' +
      '<div id="intervalSection" style="display:none">' +
        '<div class="interval-row">' +
          '<span class="interval-label">Every</span>' +
          '<input type="number" id="intervalDays" class="interval-input" min="1" max="365" value="2">' +
          '<span class="interval-label">days</span>' +
        '</div>' +
        '<input type="date" id="intervalStart" class="task-input interval-date-input" value="' + todayStr + '">' +
      '</div>' +
      '<button class="add-workout-btn" onclick="addWorkout()">+ Add Workout</button>' +
    '</div>';
  html += '</div>';
  return html;
}

function deleteTask(key, id) {
  if (!state.tasks[key]) return;
  state.tasks[key] = state.tasks[key].filter(function(x) { return x.id !== id; });
  if (state.tasks[key].length === 0) delete state.tasks[key];
  saveTasks();
  render();
}

function togglePending() {
  state.showPending = !state.showPending;
  render();
}

function goToDate(y, m, d) {
  state.year = y;
  state.month = m;
  state.selectedDate = d;
  state.showPending = false;
  render();
  if (document.activeElement && document.activeElement !== document.body) {
    document.activeElement.blur();
  }
}

function renderPendingPanel() {
  var now = new Date();
  var todayKey = dateKey(now.getFullYear(), now.getMonth(), now.getDate());
  var allKeys = Object.keys(state.tasks).sort();
  var groups = [];

  for (var a = 0; a < allKeys.length; a++) {
    var aKey = allKeys[a];
    var pending = state.tasks[aKey].filter(function(t) { return !t.done; });
    if (pending.length > 0) {
      var parts = aKey.split('-');
      groups.push({
        key: aKey,
        year: parseInt(parts[0]),
        month: parseInt(parts[1]) - 1,
        day: parseInt(parts[2]),
        tasks: pending,
        isToday: aKey === todayKey,
        isPast: aKey < todayKey
      });
    }
  }

  if (groups.length === 0) {
    return '<div class="pending-panel">' +
      '<div class="pending-empty"><div class="pending-empty-icon">🎉</div>All caught up! No pending tasks.</div>' +
    '</div>';
  }

  var html = '<div class="pending-panel">';
  var lastSection = '';

  for (var b = 0; b < groups.length; b++) {
    var g = groups[b];
    var section = g.isToday ? 'today' : (g.isPast ? 'past' : 'upcoming');

    if (section !== lastSection) {
      var sLabel = section === 'today' ? '📅 Today' : (section === 'past' ? '⏰ Overdue' : '🗓 Upcoming');
      html += '<div class="pending-section-label">' + sLabel + '</div>';
      lastSection = section;
    }

    var dayAbbr = DAYS_SHORT[new Date(g.year, g.month, g.day).getDay()];
    var dateStr = dayAbbr + ' · ' + MONTHS[g.month].slice(0, 3) + ' ' + g.day +
      (g.year !== now.getFullYear() ? ', ' + g.year : '');

    html += '<div class="pending-group">' +
      '<div class="pending-date" onclick="goToDate(' + g.year + ',' + g.month + ',' + g.day + ')">' +
        '<span class="pending-date-label">' + dateStr + '</span>' +
        '<span class="pending-count-badge">' + g.tasks.length + '</span>' +
      '</div>';

    for (var c = 0; c < g.tasks.length; c++) {
      var pt = g.tasks[c];
      html += '<div class="pending-task-item">' +
        '<button class="check-btn" onclick="toggleTask(\'' + g.key + '\',' + pt.id + ')"></button>' +
        '<span class="pending-task-text">' + escHtml(pt.text) + '</span>' +
      '</div>';
    }

    html += '</div>';
  }

  html += '</div>';
  return html;
}

function escHtml(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  var app = document.getElementById("app");
  var firstDay = new Date(state.year, state.month, 1).getDay();
  var daysInMonth = new Date(state.year, state.month + 1, 0).getDate();

  var selKey = state.selectedDate ? dateKey(state.year, state.month, state.selectedDate) : null;
  var selTasks = selKey ? (state.tasks[selKey] || []) : [];

  /* ── calendar cells ── */
  var calCells = "";
  for (var i = 0; i < firstDay; i++) calCells += '<div class="cal-cell empty"></div>';

  for (var d = 1; d <= daysInMonth; d++) {
    var key = dateKey(state.year, state.month, d);
    var dotColor = "";

    if (state.sportMode) {
      var dow = new Date(state.year, state.month, d).getDay();
      var dayWs = state.workouts.filter(function(ws) { return isWorkoutScheduledForDay(ws, state.year, state.month, d); });
      if (dayWs.length > 0) {
        var wDone = state.workoutDone[key] || [];
        var wDoneCount = dayWs.filter(function(ws) { return wDone.indexOf(ws.id) !== -1; }).length;
        if (wDoneCount === dayWs.length) dotColor = "var(--teal)";
        else if (wDoneCount > 0) dotColor = "var(--yellow)";
        else dotColor = "var(--purple)";
      }
    } else {
      var list = state.tasks[key] || [];
      var count = list.length;
      var doneCount = 0;
      for (var j = 0; j < list.length; j++) { if (list[j].done) doneCount++; }
      if (count > 0) {
        if (doneCount === count) dotColor = "var(--teal)";
        else if (doneCount > 0) dotColor = "var(--yellow)";
        else dotColor = "var(--coral)";
      }
    }

    var cls = "cal-cell";
    if (isToday(d)) cls += " today";
    if (state.selectedDate === d) cls += " selected";

    calCells += '<div class="' + cls + '" onclick="selectDate(' + d + ')">' +
      d +
      '<div class="dot-row">' + (dotColor ? '<div class="dot" style="background:' + dotColor + '"></div>' : '') + '</div>' +
      '</div>';
  }

  /* ── task panel ── */
  var taskPanel = "";
  if (state.sportMode) {
    taskPanel = renderSportDayPanel();
  } else if (state.selectedDate) {
    var dayName = DAYS_FULL[new Date(state.year, state.month, state.selectedDate).getDay()];
    var todayLabel = isToday(state.selectedDate) ? " \u00b7 Today" : "";

    var doneCount2 = 0;
    for (var k = 0; k < selTasks.length; k++) { if (selTasks[k].done) doneCount2++; }

    var badgeClass = "task-count-badge zero";
    var badgeText = "0 tasks";
    if (selTasks.length > 0) {
      badgeText = doneCount2 + "/" + selTasks.length;
      if (doneCount2 === selTasks.length) badgeClass = "task-count-badge all-done";
      else if (doneCount2 > 0) badgeClass = "task-count-badge some-done";
      else badgeClass = "task-count-badge none-done";
    }

    var taskItems = "";
    if (selTasks.length === 0) {
      taskItems = '<div class="empty-state"><div class="icon">✏️</div>No tasks yet — add one!</div>';
    } else {
      taskItems = '<div class="task-list">';
      for (var m = 0; m < selTasks.length; m++) {
        var t = selTasks[m];
        var isEditing = state.editingTask && state.editingTask.key === selKey && state.editingTask.id === t.id;
        if (isEditing) {
          taskItems +=
            '<div class="task-item editing">' +
              '<input id="editInput" class="task-edit-input" value="' + escAttr(t.text) + '" ' +
                'onkeydown="if(event.key===\'Enter\')saveEditTask();if(event.key===\'Escape\')cancelEditTask()" ' +
                'onblur="saveEditTask()">' +
            '</div>';
        } else {
          var itemCls = "task-item" + (t.done ? " task-done-item" : "");
          taskItems +=
            '<div class="' + itemCls + '"' +
              ' ontouchstart="taskLongPressStart(\'' + selKey + '\',' + t.id + ')"' +
              ' ontouchend="taskLongPressEnd()" ontouchmove="taskLongPressEnd()"' +
              ' ondblclick="startEditTask(\'' + selKey + '\',' + t.id + ')"' +
              ' oncontextmenu="return false">' +
              '<button class="check-btn ' + (t.done ? 'done' : '') + '" onclick="toggleTask(\'' + selKey + '\',' + t.id + ')">' +
                (t.done ? '&#10003;' : '') +
              '</button>' +
              '<span class="task-text ' + (t.done ? 'done' : '') + '">' + escHtml(t.text) + '</span>' +
              '<button class="del-btn" onclick="deleteTask(\'' + selKey + '\',' + t.id + ')">&#215;</button>' +
            '</div>';
        }
      }
      taskItems += '</div>';
    }

    taskPanel =
      '<div class="task-panel">' +
        '<div class="task-panel-head">' +
          '<div class="task-panel-head-left">' +
            '<h2>' + MONTHS[state.month] + ' ' + state.selectedDate + todayLabel + '</h2>' +
            '<div class="task-date-sub">' + dayName + '</div>' +
          '</div>' +
          '<span class="' + badgeClass + '">' + badgeText + '</span>' +
        '</div>' +
        '<div class="task-input-row">' +
          '<input id="taskInput" class="task-input" placeholder="Add a task..." ' +
            'onkeydown="if(event.key===\'Enter\')addTask()">' +
          '<button class="add-btn" onclick="addTask()">+</button>' +
        '</div>' +
        taskItems +
      '</div>';
  } else {
    taskPanel =
      '<div class="placeholder-panel">' +
        '<div class="icon">&#128197;</div>' +
        '<p>Pick a day to manage tasks</p>' +
        '<div class="sub">Tap any date on the calendar</div>' +
      '</div>';
  }

  /* ── day labels ── */
  var dayLabels = "";
  for (var n = 0; n < DAYS_SHORT.length; n++) {
    dayLabels += '<div class="day-label">' + DAYS_SHORT[n] + '</div>';
  }

  /* ── pending bar ── */
  var totalPending = 0;
  var pKeys = Object.keys(state.tasks);
  for (var p = 0; p < pKeys.length; p++) {
    var pList = state.tasks[pKeys[p]];
    for (var q = 0; q < pList.length; q++) { if (!pList[q].done) totalPending++; }
  }
  var pendingBar =
    '<div class="pending-bar">' +
      '<button class="pending-btn' + (state.showPending ? ' active' : '') + '" onclick="togglePending()">' +
        '📋 <span class="pending-btn-label">Pending Tasks</span>' +
        '<span class="pending-btn-count' + (totalPending === 0 ? ' zero' : '') + '">' + totalPending + '</span>' +
      '</button>' +
    '</div>';

  app.innerHTML =
    '<div class="header">' +
      '<button class="nav-btn" onclick="prevMonth()">&#9664;</button>' +
      '<div class="header-center">' +
        '<h1>' + MONTHS[state.month] + '<span>' + state.year + '</span></h1>' +
        (function() { var n = new Date(); return (state.month !== n.getMonth() || state.year !== n.getFullYear()) ? '<button class="today-btn" onclick="goToday()">Today</button>' : ''; })() +
      '</div>' +
      '<button class="nav-btn" onclick="nextMonth()">&#9654;</button>' +
    '</div>' +
    (!state.sportMode ? pendingBar : '') +
    (!state.sportMode && state.showPending ? renderPendingPanel() : '') +
    '<div class="sport-bar">' +
      '<button class="sport-btn' + (state.sportMode ? ' active' : '') + '" onclick="toggleSportMode()">🏋️ <span class="sport-btn-label">Sport Mode</span>' +
        (function() {
          if (state.sportMode) return '';
          var n = new Date();
          var todayWs = state.workouts.filter(function(w) { return isWorkoutScheduledForDay(w, n.getFullYear(), n.getMonth(), n.getDate()); });
          if (todayWs.length === 0) return '';
          var todayKey = dateKey(n.getFullYear(), n.getMonth(), n.getDate());
          var doneList = state.workoutDone[todayKey] || [];
          var done = todayWs.filter(function(w) { return doneList.indexOf(w.id) !== -1; }).length;
          var cls = done === todayWs.length ? 'task-count-badge all-done' : (done > 0 ? 'task-count-badge some-done' : 'task-count-badge none-done');
          return '<span class="' + cls + '">' + done + '/' + todayWs.length + '</span>';
        })() +
      '</button>' +
      (state.sportMode ? '<button class="sport-settings-btn' + (state.showSportSettings ? ' active' : '') + '" onclick="toggleSportSettings()">⚙️</button>' : '') +
    '</div>' +
    (state.sportMode && state.showSportSettings ? renderSportSettingsPanel() : '') +
    '<div class="layout">' +
      '<div class="cal-side" ontouchstart="swipeTouchStart(event)" ontouchend="swipeTouchEnd(event)">' +
        '<div class="day-labels">' + dayLabels + '</div>' +
        '<div class="cal-grid">' + calCells + '</div>' +
      '</div>' +
      '<div class="task-side">' + taskPanel + '</div>' +
    '</div>';
}

// Auto-select today on startup
loadTasks();
loadWorkouts();
(function() {
  var t = new Date();
  state.year = t.getFullYear();
  state.month = t.getMonth();
  state.selectedDate = t.getDate();
  render();
})();
</script>
</body>
</html>
