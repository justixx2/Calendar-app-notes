<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#5B7FFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Task Calendar</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #F2EEFF;
    --surface: #FFFFFF;
    --border: #E4DAFF;
    --text: #1D1640;
    --text-dim: #9389C0;
    --orange: #FF6B35;
    --blue: #5B7FFF;
    --pink: #FF5FA0;
    --yellow: #FFD166;
    --teal: #06D6A0;
    --coral: #FF6B6B;
    --purple: #8B5FCF;
    --radius: 16px;
    --header-gradient: linear-gradient(130deg, #5B7FFF 0%, #8B5FCF 52%, #FF5FA0 100%);
  }

  body.sport-mode {
    --bg: #EDF1FC;
    --surface: #FFFFFF;
    --border: #C8D4F0;
    --text: #18243E;
    --text-dim: #5C6E9A;
    --blue: #3A6BC4;
    --purple: #2A508E;
    --pink: #4E7EC0;
    --header-gradient: linear-gradient(130deg, #152850 0%, #1E4080 52%, #3A6BC4 100%);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .app {
    max-width: 900px;
    margin: 0 auto;
    padding: 14px 14px 28px;
  }

  /* ── HEADER ────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    background: var(--header-gradient);
    border-radius: 20px;
    padding: 13px 16px;
    box-shadow: 0 6px 24px rgba(91,127,255,0.28);
  }

  .header h1 {
    font-size: 22px;
    font-weight: 900;
    color: #FFFFFF;
    letter-spacing: -0.3px;
    line-height: 1.15;
  }

  .header h1 span {
    font-weight: 700;
    color: rgba(255,255,255,0.68);
    margin-left: 5px;
    font-size: 18px;
  }

  .nav-btn {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    border: none;
    background: rgba(255,255,255,0.22);
    color: #FFFFFF;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.14s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.38); }
  .nav-btn:active { transform: scale(0.88); }

  .today-btn {
    background: rgba(255,255,255,0.24);
    border: none;
    color: #FFFFFF;
    font-family: 'Nunito', sans-serif;
    font-size: 10px;
    font-weight: 900;
    cursor: pointer;
    padding: 3px 9px;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    border-radius: 20px;
    margin-top: 3px;
    transition: background 0.14s;
    display: block;
    white-space: nowrap;
  }
  .today-btn:hover { background: rgba(255,255,255,0.4); }

  .header-center { text-align: center; }

  /* ── LAYOUT ────────────────────────────────────── */
  .layout {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .cal-side { flex: 1 1 0; min-width: 0; }
  .task-side { flex: 0 0 272px; }

  /* ── DAY LABELS ────────────────────────────────── */
  .day-labels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 5px;
  }

  .day-label {
    text-align: center;
    font-size: 10px;
    font-weight: 900;
    color: var(--text-dim);
    padding: 4px 0;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  /* ── CALENDAR GRID ─────────────────────────────── */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-cell {
    aspect-ratio: 1;
    border-radius: 11px;
    border: 2px solid transparent;
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: all 0.13s;
    position: relative;
    box-shadow: 0 1px 3px rgba(91,127,255,0.07);
  }
  .cal-cell:hover {
    border-color: var(--blue);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(91,127,255,0.18);
  }
  .cal-cell.today {
    background: var(--orange);
    color: #FFFFFF;
    border-color: transparent;
    box-shadow: 0 3px 14px rgba(255,107,53,0.42);
  }
  .cal-cell.selected {
    background: var(--blue);
    color: #FFFFFF;
    border-color: transparent;
    box-shadow: 0 4px 16px rgba(91,127,255,0.45);
    transform: translateY(-2px);
  }
  .cal-cell.today.selected {
    background: #E55A20;
    box-shadow: 0 4px 16px rgba(229,90,32,0.45);
  }
  .cal-cell.empty {
    background: transparent;
    cursor: default;
    box-shadow: none;
  }
  .cal-cell.empty:hover { transform: none; border-color: transparent; box-shadow: none; }

  .dot-row { display: flex; gap: 1.5px; height: 4px; flex-wrap: wrap; max-width: 100%; }
  .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
  }
  .cal-cell.selected .dot,
  .cal-cell.today .dot { filter: brightness(2) saturate(0.5); }

  /* ── TASK PANEL ────────────────────────────────── */
  .task-panel {
    background: var(--surface);
    border-radius: 20px;
    padding: 13px 13px 11px;
    position: sticky;
    top: 14px;
    border: 2px solid var(--border);
    box-shadow: 0 4px 20px rgba(91,127,255,0.1);
  }

  .task-panel-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 6px;
    margin-bottom: 10px;
  }

  .task-panel-head-left { min-width: 0; }

  .task-panel h2 {
    font-size: 15px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .task-date-sub {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 1px;
  }

  .task-count-badge {
    border-radius: 20px;
    padding: 3px 9px;
    font-size: 10px;
    font-weight: 900;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .task-count-badge.all-done { background: var(--teal); color: white; }
  .task-count-badge.some-done { background: var(--yellow); color: var(--text); }
  .task-count-badge.none-done { background: var(--coral); color: white; }
  .task-count-badge.zero { background: var(--border); color: var(--text-dim); }

  .task-input-row {
    display: flex;
    gap: 6px;
    margin-bottom: 9px;
  }

  .task-input {
    flex: 1;
    padding: 9px 11px;
    border-radius: 11px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    outline: none;
    transition: border-color 0.14s;
    min-width: 0;
  }
  .task-input:focus { border-color: var(--blue); }
  .task-input::placeholder { color: var(--text-dim); font-weight: 600; }

  .add-btn {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    border: none;
    background: linear-gradient(135deg, var(--orange) 0%, var(--pink) 100%);
    color: #fff;
    font-weight: 900;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(255,107,53,0.38);
    line-height: 1;
  }
  .add-btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
  .add-btn:active { transform: scale(0.88); }

  /* ── TASK LIST ─────────────────────────────────── */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 9px;
    background: var(--bg);
    border-radius: 11px;
    border: 2px solid transparent;
    border-left: 3px solid var(--blue);
    animation: fadeIn 0.17s ease;
    transition: border-color 0.13s, border-left-color 0.13s;
  }
  .task-item.task-done-item {
    border-left-color: var(--teal);
    opacity: 0.8;
  }
  .task-item:hover { border-color: var(--border); border-left-color: var(--blue); }
  .task-item.task-done-item:hover { border-left-color: var(--teal); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-3px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-btn {
    width: 21px;
    height: 21px;
    border-radius: 7px;
    border: 2.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #fff;
    font-weight: 900;
    transition: all 0.14s;
  }
  .check-btn:hover { border-color: var(--teal); }
  .check-btn.done {
    border: none;
    background: var(--teal);
    box-shadow: 0 2px 6px rgba(6,214,160,0.38);
  }

  .task-text {
    flex: 1;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
    word-break: break-word;
  }
  .task-text.done {
    text-decoration: line-through;
    color: var(--text-dim);
    font-weight: 600;
  }
  .done-date {
    font-size: 10px;
    font-weight: 700;
    color: var(--teal);
    border: 1.5px solid var(--teal);
    border-radius: 20px;
    padding: 1px 6px;
    white-space: nowrap;
    flex-shrink: 0;
    opacity: 0.75;
  }

  /* ── pin button (add to focus) on task items ── */
  .pin-btn {
    background: none; border: none;
    font-size: 15px; line-height: 1;
    color: var(--border); cursor: pointer;
    padding: 0 2px; flex-shrink: 0;
    transition: color 0.13s, transform 0.13s;
  }
  .pin-btn:hover { color: var(--blue); transform: scale(1.15); }
  .pin-btn.active { color: var(--blue); }

  /* ── focus bar button (in pending-bar) ── */
  .focus-bar-btn {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    background: var(--surface); border: 2px solid var(--border);
    color: var(--text-dim); font-size: 16px; font-weight: 900;
    padding: 8px 12px; border-radius: 14px; cursor: pointer;
    transition: all 0.14s; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(91,127,255,0.08);
  }
  .focus-bar-btn:hover { border-color: var(--blue); }
  .focus-bar-btn.active { background: var(--blue); border-color: transparent; color: #fff; box-shadow: 0 4px 16px rgba(91,127,255,0.35); }
  .focus-bar-btn.active .pending-btn-count { background: rgba(255,255,255,0.25); color: #fff; }

  /* ── focus panel ── */
  .focus-panel { display: flex; flex-direction: column; height: 100%; }

  /* ── focus item: from-date badge (tappable, navigates to that day) ── */
  .focus-from-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-size: 10px; font-weight: 700;
    color: var(--text-dim); cursor: pointer;
    padding: 1px 7px; white-space: nowrap; flex-shrink: 0;
    transition: border-color 0.13s, color 0.13s;
  }
  .focus-from-btn:hover { border-color: var(--blue); color: var(--blue); }

  /* ── focus remove button ── */
  .focus-remove-btn {
    background: none; border: none;
    color: var(--text-dim); cursor: pointer;
    font-size: 16px; line-height: 1;
    padding: 0 2px; opacity: 0.5; flex-shrink: 0;
    transition: opacity 0.13s;
  }
  .focus-remove-btn:hover { opacity: 1; }

  .del-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 15px;
    padding: 0 2px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.14s, color 0.14s;
    font-weight: 900;
    flex-shrink: 0;
  }
  .task-item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--coral); }

  .task-edit-input {
    flex: 1;
    padding: 5px 8px;
    border-radius: 8px;
    border: 2px solid var(--blue);
    background: var(--surface);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    outline: none;
    min-width: 0;
  }
  .task-item.editing { border-left-color: var(--blue); background: var(--surface); }

  /* ── EMPTY / PLACEHOLDER ───────────────────────── */
  .empty-state {
    text-align: center;
    padding: 14px 0;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 700;
  }
  .empty-state .icon { font-size: 22px; margin-bottom: 4px; }

  .placeholder-panel {
    background: var(--surface);
    border-radius: 20px;
    border: 2px solid var(--border);
    padding: 36px 20px;
    text-align: center;
    color: var(--text-dim);
    box-shadow: 0 4px 20px rgba(91,127,255,0.08);
  }
  .placeholder-panel .icon { font-size: 34px; margin-bottom: 10px; }
  .placeholder-panel p { font-size: 13px; font-weight: 800; line-height: 1.5; color: var(--text); }
  .placeholder-panel .sub { font-size: 11px; font-weight: 600; margin-top: 4px; color: var(--text-dim); }

  /* ── PENDING PANEL ─────────────────────────────── */
  .pending-bar { margin-bottom: 10px; display: flex; gap: 8px; align-items: center; }

  .pending-btn {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 10px 16px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.14s;
    box-shadow: 0 2px 8px rgba(91,127,255,0.08);
    text-align: left;
  }
  .pending-btn:hover { border-color: var(--blue); }
  .pending-btn.active {
    background: var(--blue);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 16px rgba(91,127,255,0.35);
  }
  .pending-btn-label { flex: 1; }
  .pending-btn-count {
    background: var(--coral);
    color: #fff;
    border-radius: 20px;
    padding: 2px 9px;
    font-size: 11px;
    font-weight: 900;
    flex-shrink: 0;
  }
  .pending-btn.active .pending-btn-count { background: rgba(255,255,255,0.25); }
  .pending-btn-count.zero { background: var(--border); color: var(--text-dim); }
  .pending-btn-count.all-done { background: var(--teal); }
  .pending-btn-count.some-done { background: var(--yellow); color: var(--text); }

  .pending-panel {
    background: var(--surface);
    border-radius: 20px;
    border: 2px solid var(--border);
    padding: 12px 14px;
    margin-bottom: 10px;
    box-shadow: 0 4px 20px rgba(91,127,255,0.1);
    max-height: 420px;
    overflow-y: auto;
  }

  .pending-empty {
    text-align: center;
    padding: 22px 0 14px;
    color: var(--text-dim);
    font-weight: 700;
    font-size: 13px;
  }
  .pending-empty-icon { font-size: 30px; margin-bottom: 6px; }

  .pending-section-label {
    font-size: 9px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    color: var(--text-dim);
    padding: 8px 2px 5px;
  }
  .pending-section-label:first-child { padding-top: 2px; }

  .pending-group {
    background: var(--bg);
    border-radius: 12px;
    padding: 9px 11px;
    margin-bottom: 6px;
  }
  .pending-group:last-child { margin-bottom: 0; }

  .pending-date {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
    cursor: pointer;
  }
  .pending-date-label {
    font-size: 12px;
    font-weight: 900;
    color: var(--text);
    transition: color 0.13s;
  }
  .pending-date:hover .pending-date-label { color: var(--blue); }

  .pending-count-badge {
    background: var(--coral);
    color: #fff;
    border-radius: 20px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .pending-task-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-top: 1px solid var(--border);
  }
  .pending-task-text {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    line-height: 1.35;
    word-break: break-word;
  }

  /* ── SPORT MODE ─────────────────────────────────── */
  .sport-bar { display: flex; gap: 6px; margin-bottom: 10px; }

  .sport-btn {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 10px 16px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.14s;
    box-shadow: 0 2px 8px rgba(91,127,255,0.08);
    text-align: left;
  }
  .sport-btn:hover { border-color: var(--purple); }
  .sport-btn.active {
    background: linear-gradient(135deg, var(--purple) 0%, var(--blue) 100%);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 16px rgba(139,95,207,0.4);
  }
  .sport-btn-label { flex: 1; }

  .sport-settings-btn {
    width: 44px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.14s;
    flex-shrink: 0;
  }
  .sport-settings-btn:hover { border-color: var(--purple); }
  .sport-settings-btn.active { background: var(--purple); border-color: transparent; color: #fff; }

  .backup-btn {
    width: 44px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.14s;
    flex-shrink: 0;
  }
  .backup-btn:hover { border-color: var(--purple); }
  .backup-btn.active { background: var(--purple); border-color: transparent; color: #fff; }

  /* ── workout color picker ── */
  .workout-color-row { display: flex; gap: 5px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
  .wc-opt {
    width: 20px; height: 20px; border-radius: 50%; cursor: pointer; flex-shrink: 0;
    border: 2.5px solid transparent; transition: transform 0.13s, border-color 0.13s;
    display: flex; align-items: center; justify-content: center;
  }
  .wc-opt:hover { transform: scale(1.18); }
  .wc-opt.wc-none { background: var(--border); color: var(--text-dim); font-size: 10px; font-weight: 900; }
  .wc-opt.wc-active { border-color: var(--text); transform: scale(1.22); }
  .wc-pick-section { margin: 8px 0 4px; }
  .wc-pick-label { font-size: 11px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .wc-pick-row { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
  .wc-radio { display: none; }
  .wc-pick-opt {
    width: 26px; height: 26px; border-radius: 50%; cursor: pointer; flex-shrink: 0;
    border: 3px solid transparent; transition: transform 0.13s, border-color 0.13s; display: block;
  }
  .wc-pick-opt:hover { transform: scale(1.15); }
  .wc-radio:checked + .wc-pick-opt { border-color: var(--text); transform: scale(1.2); }
  .wc-pick-none { background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text-dim); font-weight: 900; }

  .backup-panel {
    background: var(--surface);
    border-radius: 20px;
    border: 2px solid var(--border);
    padding: 16px;
    margin-bottom: 10px;
    box-shadow: 0 4px 20px rgba(139,95,207,0.1);
  }
  .backup-panel h3 { margin: 0 0 12px; font-size: 15px; color: var(--text); }
  .backup-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .backup-action-btn {
    flex: 1;
    padding: 10px 8px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--surface);

  }
  .backup-action-btn:hover { border-color: var(--purple); color: var(--purple); }

  .backup-action-btn.primary:hover { opacity: 0.88; }
  .backup-info { font-size: 12px; color: var(--text-dim); margin-top: 4px; text-align: center; }
  .backup-import-drop {

  .sport-settings-panel {

    margin-bottom: 10px;
    box-shadow: 0 4px 20px rgba(139,95,207,0.1);

  .workout-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .workout-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border-radius: 11px;
    padding: 8px 10px;
  }
  .workout-name {
    flex: 1;
    font-size: 13px;

  .workout-days { display: flex; gap: 3px; flex-shrink: 0; flex-wrap: wrap; }
  .day-pill-static {

  }

  .workout-empty {

    padding: 6px 0 10px;
  }

  .add-workout { padding-top: 10px; border-top: 2px solid var(--border); }
  .add-workout-label {
    font-size: 10px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.8px;

  }
  .day-picker { display: flex; gap: 5px; margin: 8px 0 10px; flex-wrap: wrap; }
  .day-pill {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg);
    display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 10px; font-weight: 900;
    cursor: pointer;
    transition: all 0.13s;

  }
  .day-pill input[type="checkbox"] { display: none; }
  .day-pill:has(input:checked) { background: var(--purple); border-color: var(--purple); color: #fff; }

  .add-workout-btn {
    width: 100%; height: 38px;
    border-radius: 11px; border: none;
    background: linear-gradient(135deg, var(--purple) 0%, var(--blue) 100%);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 900;
    cursor: pointer;
    transition: filter 0.13s, transform 0.13s;
    box-shadow: 0 3px 10px rgba(139,95,207,0.38);
    margin-top: 2px;
  }
  .add-workout-btn:hover { filter: brightness(1.08); }
  .add-workout-btn:active { transform: scale(0.97); }

  /* ── workout cell (text + tags column) in day panel ── */
  .workout-cell {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  /* ── exercise tag links (day panel, tappable) ── */
  .ex-tag-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .ex-tag-link {
    font-size: 10px; font-weight: 700;
    color: var(--blue);
    border: 1.5px solid var(--blue);
    border-radius: 20px;
    padding: 2px 8px;
    text-decoration: none;
    opacity: 0.82;
    transition: opacity 0.13s, background 0.13s;
    white-space: nowrap;
  }
  .ex-tag-link:hover { opacity: 1; background: var(--blue); color: #fff; }

  /* ── exercise tag static pills (settings workout row) ── */
  .workout-name-col { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
  .ex-tag-row-static { display: flex; flex-wrap: wrap; gap: 4px; }
  .ex-tag-static {
    font-size: 10px; font-weight: 700;
    color: var(--blue); opacity: 0.7;
    border: 1px solid var(--blue);
    border-radius: 20px;
    padding: 1px 6px;
    white-space: nowrap;
  }

  /* ── tag picker in add-workout form ── */
  .tag-picker-section { margin-bottom: 8px; }
  .tag-picker-label {
    font-size: 11px; font-weight: 700;
    color: var(--text-dim); margin-bottom: 5px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .tag-picker-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag-pick-pill {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 700;
    color: var(--text-dim);
    border: 1.5px solid var(--border);

  }
  .tag-pick-pill input[type="checkbox"] { display: none; }
  .tag-pick-pill:has(input:checked) {

  }

  /* ── exercise library section ── */
  .ex-library {
    border-top: 1.5px solid var(--border);

  }
  .ex-library-header {
    font-size: 12px; font-weight: 800;

  }
  .ex-library-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .ex-library-row {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }
  .ex-library-name-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .ex-library-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .ex-library-url {
    font-size: 11px; color: var(--blue); text-decoration: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    opacity: 0.75;
  }
  .ex-library-url:hover { opacity: 1; text-decoration: underline; }
  .add-ex-form { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }

  /* ── one-time workout badge (settings list) ── */
  .workout-once-badge {
    background: var(--blue);
    color: #fff;
    border-radius: 20px;
    font-size: 11px; font-weight: 700;
    padding: 2px 9px;
    white-space: nowrap; flex-shrink: 0;
  }

  /* ── delete button on once items in day panel ── */
  .once-del-btn {
    background: none; border: none;
    color: var(--text-dim); cursor: pointer;
    font-size: 16px; line-height: 1;
    padding: 0 2px; margin-left: auto;
    opacity: 0.55; transition: opacity 0.13s;
    flex-shrink: 0;
  }
  .once-del-btn:hover { opacity: 1; }

  /* ── "+ Custom workout" button row ── */
  .once-add-row {
    padding: 8px 16px 4px;
  }
  .once-add-btn {
    background: none; border: 1.5px dashed var(--border);
    color: var(--text-dim); border-radius: 10px;
    font-size: 12px; font-weight: 600;
    padding: 7px 14px; cursor: pointer;
    width: 100%; transition: border-color 0.15s, color 0.15s;
  }
  .once-add-btn:hover { border-color: var(--blue); color: var(--blue); }

  /* ── inline once-workout form ── */
  .once-form {
    padding: 10px 16px 8px;
    display: flex; flex-direction: column; gap: 7px;
  }
  .once-form-row {
    display: flex; gap: 8px;
  }
  .once-confirm-btn {
    flex: 1; height: 34px; border-radius: 9px; border: none;
    background: linear-gradient(135deg, var(--purple) 0%, var(--blue) 100%);
    color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
    transition: filter 0.13s;
  }
  .once-confirm-btn:hover { filter: brightness(1.1); }
  .once-cancel-btn {
    height: 34px; padding: 0 16px; border-radius: 9px;
    border: 1.5px solid var(--border); background: none;
    color: var(--text-dim); font-size: 13px; font-weight: 600; cursor: pointer;
    transition: border-color 0.13s;
  }
  .once-cancel-btn:hover { border-color: var(--text-dim); }

  .workout-interval-badge {
    background: var(--purple);
    color: #fff;
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 900;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .sport-btn-count {
    background: var(--purple);
    color: #fff;
    border-radius: 20px;
    padding: 2px 9px;
    font-size: 11px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .sched-type { display: flex; gap: 6px; margin: 8px 0 6px; }
  .sched-type-opt {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 7px 10px;
    border-radius: 10px;
    border: 2px solid var(--border);
    font-size: 11px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.13s;
    color: var(--text-dim);
    user-select: none;
    font-family: 'Nunito', sans-serif;
  }
  .sched-type-opt input { display: none; }
  .sched-type-opt:has(input:checked) { background: var(--purple); border-color: var(--purple); color: #fff; }

  .interval-row { display: flex; align-items: center; gap: 8px; margin: 6px 0 4px; flex-wrap: wrap; }
  .interval-input {
    width: 64px;
    padding: 7px 8px;
    border-radius: 9px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 900;
    text-align: center;
    outline: none;
  }
  .interval-input:focus { border-color: var(--purple); }
  .interval-label { font-size: 13px; font-weight: 800; color: var(--text); }
  .interval-date-input { margin-top: 6px; width: 100%; }

  /* ── MOBILE ────────────────────────────────────── */
  @media (max-width: 700px) {
    .layout { flex-direction: column; gap: 10px; }
    .cal-side { width: 100%; flex: none; }
    .task-side { width: 100%; flex: none; }
    .task-panel { position: static; }
    .app { padding: 10px 10px 22px; }
    .header { padding: 11px 13px; border-radius: 16px; margin-bottom: 11px; }
    .header h1 { font-size: 18px; }
    .header h1 span { font-size: 15px; }
    .nav-btn { width: 34px; height: 34px; font-size: 12px; }
    .cal-cell { font-size: 12px; border-radius: 9px; }
    .day-label { font-size: 9px; padding: 3px 0; }
    .cal-grid { gap: 3px; }
    .del-btn { opacity: 1; }
  }
</style>

<body>

<div class="app" id="app"></div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(function(){});
  // Auto-reload when a new service worker takes control (ensures home screen app always gets latest version)
  navigator.serviceWorker.addEventListener("controllerchange", function() {
    window.location.reload();
  });
}

var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
var DAYS_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var DAYS_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
var WORKOUT_COLORS = ['#FF6B6B','#FF9500','#FFD166','#06D6A0','#5B7FFF','#C77DFF'];

var state = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  selectedDate: null,
  tasks: {},
  showPending: false,
  editingTask: null,
  sportMode: false,
  showSportSettings: false,
  showOnceForm: false,
  workouts: [],
  workoutDone: {},
  exerciseTags: [],
  focusList: [],
  showFocus: false,
  showBackup: false,
  showHistory: false,
  workoutCompletedAt: {}
};

function loadTasks() {
  try {
    var saved = localStorage.getItem("task-calendar-data");
    if (saved) state.tasks = JSON.parse(saved);
  } catch(e) {}
}

function saveTasks() {
  try {
    localStorage.setItem("task-calendar-data", JSON.stringify(state.tasks));
  } catch(e) {}
}
function loadFocusList() {
  try {
    var saved = localStorage.getItem("focus-list");
    if (saved) state.focusList = JSON.parse(saved) || [];
  } catch(e) {}
}
function saveFocusList() {
  try {
    localStorage.setItem("focus-list", JSON.stringify(state.focusList));
  } catch(e) {}
}
function isInFocus(key, id) {
  for (var i = 0; i < state.focusList.length; i++) {
    if (state.focusList[i].key === key && state.focusList[i].taskId === id) return true;
  }
  return false;
}
function addToFocus(key, id) {
  if (isInFocus(key, id)) {
    state.focusList = state.focusList.filter(function(fi) { return !(fi.key === key && fi.taskId === id); });
  } else {
    state.focusList.push({ key: key, taskId: id });
  }
  saveFocusList();
  render();
}
function removeFromFocus(key, id) {
  state.focusList = state.focusList.filter(function(fi) { return !(fi.key === key && fi.taskId === id); });
  saveFocusList();
  render();
}
function toggleFocusView() {
  state.showFocus = !state.showFocus;
  if (state.showFocus) { state.showPending = false; state.showHistory = false; }
  render();
}
function toggleHistory() {
  state.showHistory = !state.showHistory;
  if (state.showHistory) { state.showPending = false; state.showFocus = false; state.showBackup = false; }
  render();
}
function renderHistoryPanel() {
  if (state.sportMode) {
    var byDate = {};
    var schedKeys = Object.keys(state.workoutDone);
    for (var i = 0; i < schedKeys.length; i++) {
      var sKey = schedKeys[i];
      var doneIds = state.workoutDone[sKey];
      for (var j = 0; j < doneIds.length; j++) {
        var wId = doneIds[j];
        var workout = null;
        for (var k = 0; k < state.workouts.length; k++) {
          if (state.workouts[k].id === wId) { workout = state.workouts[k]; break; }
        }
        var name = workout ? workout.name : '(deleted workout)';
        var completedAt = (state.workoutCompletedAt[sKey] && state.workoutCompletedAt[sKey][wId]) || sKey;
        if (!byDate[completedAt]) byDate[completedAt] = [];
        byDate[completedAt].push({ schedKey: sKey, name: name });
      }
    }
    var dates = Object.keys(byDate).sort().reverse();
    if (dates.length === 0) {
      return '<div class="pending-panel"><div class="pending-empty"><div class="pending-empty-icon">📜</div>No completed workouts yet.</div></div>';
    }
    var html = '<div class="pending-panel">';
    var now = new Date();
    for (var di = 0; di < dates.length; di++) {
      var date = dates[di];
      var dp = date.split('-');
      var dy = parseInt(dp[0]), dm = parseInt(dp[1])-1, dd = parseInt(dp[2]);
      var dayAbbr = DAYS_SHORT[new Date(dy, dm, dd).getDay()];
      var dateStr = dayAbbr + ' \u00b7 ' + MONTHS[dm].slice(0,3) + ' ' + dd + (dy !== now.getFullYear() ? ', ' + dy : '');
      var items = byDate[date];
      html += '<div class="pending-group"><div class="pending-date" onclick="goToDate(' + dy + ',' + dm + ',' + dd + ')"><span class="pending-date-label">' + dateStr + '</span><span class="pending-count-badge" style="background:var(--teal)">' + items.length + '</span></div>';
      for (var ii = 0; ii < items.length; ii++) {
        var it = items[ii];
        var fp = it.schedKey.split('-');
        var fy = parseInt(fp[0]), fm = parseInt(fp[1])-1, fd = parseInt(fp[2]);
        var fromLabel = it.schedKey !== date ? '<button class="focus-from-btn" onclick="goToDate(' + fy + ',' + fm + ',' + fd + ')">' + MONTHS[fm].slice(0,3) + ' ' + fd + '</button>' : '';
        html += '<div class="pending-task-item"><div class="check-btn done" style="pointer-events:none;flex-shrink:0">&#10003;</div><span class="pending-task-text">' + escHtml(it.name) + '</span>' + fromLabel + '</div>';
      }
      html += '</div>';
    }
    return html + '</div>';
  }
  var byDate2 = {};
  var allKeys = Object.keys(state.tasks);
  for (var ai = 0; ai < allKeys.length; ai++) {
    var ak = allKeys[ai];
    var list = state.tasks[ak];
    for (var aj = 0; aj < list.length; aj++) {
      var t = list[aj];
      if (t.done) {
        var cDate = t.completedDate || ak;
        if (!byDate2[cDate]) byDate2[cDate] = [];
        byDate2[cDate].push({ key: ak, task: t });
      }
    }
  }
  var dates2 = Object.keys(byDate2).sort().reverse();
  if (dates2.length === 0) {
    return '<div class="pending-panel"><div class="pending-empty"><div class="pending-empty-icon">📜</div>No completed tasks yet.</div></div>';
  }
  var html2 = '<div class="pending-panel">';
  var now2 = new Date();
  for (var bi = 0; bi < dates2.length; bi++) {
    var bDate = dates2[bi];
    var bp = bDate.split('-');
    var by = parseInt(bp[0]), bm = parseInt(bp[1])-1, bd = parseInt(bp[2]);
    var bAbbr = DAYS_SHORT[new Date(by, bm, bd).getDay()];
    var bStr = bAbbr + ' \u00b7 ' + MONTHS[bm].slice(0,3) + ' ' + bd + (by !== now2.getFullYear() ? ', ' + by : '');
    var bItems = byDate2[bDate];
    html2 += '<div class="pending-group"><div class="pending-date" onclick="goToDate(' + by + ',' + bm + ',' + bd + ')"><span class="pending-date-label">' + bStr + '</span><span class="pending-count-badge" style="background:var(--teal)">' + bItems.length + '</span></div>';
    for (var ci = 0; ci < bItems.length; ci++) {
      var bit = bItems[ci];
      var bfp = bit.key.split('-');
      var bfy = parseInt(bfp[0]), bfm = parseInt(bfp[1])-1, bfd = parseInt(bfp[2]);
      var bFromLabel = bit.key !== bDate ? '<button class="focus-from-btn" onclick="goToDate(' + bfy + ',' + bfm + ',' + bfd + ')">' + MONTHS[bfm].slice(0,3) + ' ' + bfd + '</button>' : '';
      html2 += '<div class="pending-task-item"><div class="check-btn done" style="pointer-events:none;flex-shrink:0">&#10003;</div><span class="pending-task-text" style="text-decoration:line-through;color:var(--text-dim)">' + escHtml(bit.task.text) + '</span>' + bFromLabel + '</div>';
    }
    html2 += '</div>';
  }
  return html2 + '</div>';
}
function renderFocusPanel() {
  var validItems = state.focusList.filter(function(fi) {
    var list = state.tasks[fi.key] || [];
    for (var i = 0; i < list.length; i++) { if (list[i].id === fi.taskId) return true; }
    return false;
  });
  var doneCount = 0;
  var itemsHtml = '';
  if (validItems.length === 0) {
    itemsHtml = '<div class="empty-state"><div class="icon">&#128204;</div>Pin tasks from any day to focus on them today.</div>';
  } else {
    itemsHtml = '<div class="task-list">';
    for (var i = 0; i < validItems.length; i++) {
      var fi = validItems[i];
      var list = state.tasks[fi.key] || [];
      var task = null;
      for (var j = 0; j < list.length; j++) { if (list[j].id === fi.taskId) { task = list[j]; break; } }
      if (!task) continue;
      if (task.done) doneCount++;
      var fp = fi.key.split('-');
      var fromLabel = MONTHS[parseInt(fp[1])-1].slice(0,3) + ' ' + parseInt(fp[2]);
      itemsHtml +=
        '<div class="task-item' + (task.done ? ' task-done-item' : '') + '">' +
          '<button class="check-btn ' + (task.done ? 'done' : '') + '" onclick="toggleTask(\'' + fi.key + '\',' + fi.taskId + ')">' +
            (task.done ? '&#10003;' : '') + '</button>' +
          '<span class="task-text ' + (task.done ? 'done' : '') + '">' + escHtml(task.text) + '</span>' +
          '<button class="focus-from-btn" onclick="goToDate(' + fp[0] + ',' + (parseInt(fp[1])-1) + ',' + parseInt(fp[2]) + ')" title="Go to ' + fromLabel + '">' + fromLabel + '</button>' +
          '<button class="focus-remove-btn" onclick="removeFromFocus(\'' + fi.key + '\',' + fi.taskId + ')">&#215;</button>' +
        '</div>';
    }
    itemsHtml += '</div>';
  }
  var total = validItems.length;
  var badgeClass = total === 0 ? 'task-count-badge zero' : (doneCount === total ? 'task-count-badge all-done' : (doneCount > 0 ? 'task-count-badge some-done' : 'task-count-badge none-done'));
  return '<div class="focus-panel">' +
    '<div class="task-panel-head">' +
      '<div class="task-panel-head-left">' +
        '<h2>Today\'s Focus</h2>' +
        '<div class="task-date-sub">Pinned tasks</div>' +
      '</div>' +
      (total > 0 ? '<span class="' + badgeClass + '">' + doneCount + '/' + total + '</span>' : '') +
    '</div>' +
    itemsHtml +
  '</div>';
}

function dateKey(y, m, d) {
  return y + "-" + String(m+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
}

function isToday(d) {
  var t = new Date();
  return d === t.getDate() && state.month === t.getMonth() && state.year === t.getFullYear();
}

function prevMonth() {
  if (state.month === 0) { state.month = 11; state.year--; } else state.month--;
  var n = new Date();
  state.selectedDate = (state.month === n.getMonth() && state.year === n.getFullYear()) ? n.getDate() : null;
  render();
}

function nextMonth() {
  if (state.month === 11) { state.month = 0; state.year++; } else state.month++;
  var n = new Date();
  state.selectedDate = (state.month === n.getMonth() && state.year === n.getFullYear()) ? n.getDate() : null;
  render();
}

function goToday() {
  var t = new Date();
  state.year = t.getFullYear();
  state.month = t.getMonth();
  state.selectedDate = t.getDate();
  render();
}

function selectDate(d) {
  state.selectedDate = d;
  state.showFocus = false;
  render();
  // Prevent browser from auto-focusing the input (avoids keyboard popup on mobile)
  if (document.activeElement && document.activeElement !== document.body) {
    document.activeElement.blur();
  }
  if (window.innerWidth <= 700) {
    setTimeout(function() {
      var panel = document.querySelector(".task-panel");

  }
}

function addTask() {
  var input = document.getElementById("taskInput");
  var text = input.value.trim();
  if (!text || !state.selectedDate) return;
  var key = dateKey(state.year, state.month, state.selectedDate);
  if (!state.tasks[key]) state.tasks[key] = [];
  state.tasks[key].push({ text: text, done: false, id: Date.now() });
  saveTasks();
  input.value = "";
  render();
  setTimeout(function() {
    var el = document.getElementById("taskInput");
    if (el) el.focus();
    if (window.innerWidth <= 700) {
      var list = document.querySelector(".task-list");
      if (list && list.lastElementChild) {
        list.lastElementChild.scrollIntoView({ behavior: "smooth", block: "nearest" });

function toggleTask(key, id) {
  var list = state.tasks[key];
  if (!list) return;
  for (var i = 0; i < list.length; i++) {
    if (list[i].id === id) {
      list[i].done = !list[i].done;
      if (list[i].done) {
        var now = new Date();
        list[i].completedDate = dateKey(now.getFullYear(), now.getMonth(), now.getDate());
      } else {
        delete list[i].completedDate;
      }
      break;
    }
  }
  if (navigator.vibrate) navigator.vibrate(50);

  render();

/* ── swipe to change month ── */
var swipeStartX = 0, swipeStartY = 0;
function swipeTouchStart(e) {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
}
function swipeTouchEnd(e) {
  var dx = e.changedTouches[0].clientX - swipeStartX;
  var dy = e.changedTouches[0].clientY - swipeStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) nextMonth(); else prevMonth();
  }
}

function taskLongPressEnd() {

function addWorkout() {
  var nameEl = document.getElementById('workoutInput');
  var name = nameEl ? nameEl.value.trim() : '';
  if (!name) return;
  var intervalRadio = document.getElementById('schedInterval');
  var isInterval = intervalRadio && intervalRadio.checked;
  var workout;
  if (isInterval) {
    var nEl = document.getElementById('intervalDays');
    var n = nEl ? parseInt(nEl.value) : 2;
    if (!n || n < 1) n = 1;
    var startEl = document.getElementById('intervalStart');
    var startDate = (startEl && startEl.value) ? startEl.value : new Date().toISOString().split('T')[0];
    workout = { id: Date.now(), name: name, type: 'interval', intervalDays: n, startDate: startDate };
  } else {
    var days = [];
    for (var wi = 0; wi < 7; wi++) {
      var cb = document.getElementById('wd' + wi);
      if (cb && cb.checked) days.push(wi);
    }
    if (days.length === 0) return;
    workout = { id: Date.now(), name: name, type: 'weekly', days: days };
  }
  var tagIds = [];
  for (var ti = 0; ti < state.exerciseTags.length; ti++) {
    var tcb = document.getElementById('wtag_' + state.exerciseTags[ti].id);
    if (tcb && tcb.checked) tagIds.push(state.exerciseTags[ti].id);
  }
  workout.tagIds = tagIds;
  var colorRadio = document.querySelector('input[name="wcolor"]:checked');
  workout.color = (colorRadio && colorRadio.value) ? colorRadio.value : null;
  state.workouts.push(workout);
  saveWorkouts();
  render();
}
function deleteWorkout(id) {
  state.workouts = state.workouts.filter(function(w) { return w.id !== id; });
  saveWorkouts();
  render();
}
function setWorkoutColor(id, color) {
  for (var i = 0; i < state.workouts.length; i++) {
    if (state.workouts[i].id === id) { state.workouts[i].color = color || null; break; }
  }
  saveWorkouts();
  render();
}
function toggleWorkoutDone(key, workoutId) {
  if (!state.workoutDone[key]) state.workoutDone[key] = [];
  var idx = state.workoutDone[key].indexOf(workoutId);
  if (idx === -1) {
    state.workoutDone[key].push(workoutId);
    var now = new Date();
    var todayKey = dateKey(now.getFullYear(), now.getMonth(), now.getDate());
    if (!state.workoutCompletedAt[key]) state.workoutCompletedAt[key] = {};
    state.workoutCompletedAt[key][workoutId] = todayKey;
  } else {
    state.workoutDone[key].splice(idx, 1);
    if (state.workoutCompletedAt[key]) delete state.workoutCompletedAt[key][workoutId];
  }
  if (navigator.vibrate) navigator.vibrate(50);
  saveWorkouts();
  render();
}
function isWorkoutScheduledForDay(workout, year, month, day) {
  if (workout.type === 'once') return workout.date === dateKey(year, month, day);
  if (workout.type === 'interval') {
    var target = new Date(year, month, day);
    var sp = workout.startDate.split('-');
    var start = new Date(parseInt(sp[0]), parseInt(sp[1]) - 1, parseInt(sp[2]));
    var diffDays = Math.round((target - start) / 86400000);
    return diffDays >= 0 && diffDays % workout.intervalDays === 0;
  }
  var dow = new Date(year, month, day).getDay();
  return workout.days && workout.days.indexOf(dow) !== -1;
}

}

function goToDate(y, m, d) {
  state.year = y;
  state.month = m;
  state.selectedDate = d;
  state.showPending = false;
  render();
  if (document.activeElement && document.activeElement !== document.body) {
    document.activeElement.blur();
  }
}

function renderPendingPanel() {
  var now = new Date();
  var todayKey = dateKey(now.getFullYear(), now.getMonth(), now.getDate());
  var allKeys = Object.keys(state.tasks).sort();
  var groups = [];

  for (var a = 0; a < allKeys.length; a++) {
    var aKey = allKeys[a];
    var pending = state.tasks[aKey].filter(function(t) { return !t.done; });
    if (pending.length > 0) {
      var parts = aKey.split('-');
      groups.push({
        key: aKey,
        year: parseInt(parts[0]),
        month: parseInt(parts[1]) - 1,
        day: parseInt(parts[2]),
        tasks: pending,
        isToday: aKey === todayKey,
        isPast: aKey < todayKey
      });
    }
  }

  if (groups.length === 0) {
    return '<div class="pending-panel">' +
      '<div class="pending-empty"><div class="pending-empty-icon">🎉</div>All caught up! No pending tasks.</div>' +
    '</div>';
  }

  var html = '<div class="pending-panel">';
  var lastSection = '';

  for (var b = 0; b < groups.length; b++) {
    var g = groups[b];
    var section = g.isToday ? 'today' : (g.isPast ? 'past' : 'upcoming');

    if (section !== lastSection) {
      var sLabel = section === 'today' ? '📅 Today' : (section === 'past' ? '⏰ Overdue' : '🗓 Upcoming');
      html += '<div class="pending-section-label">' + sLabel + '</div>';
      lastSection = section;
    }

    var dayAbbr = DAYS_SHORT[new Date(g.year, g.month, g.day).getDay()];
    var dateStr = dayAbbr + ' · ' + MONTHS[g.month].slice(0, 3) + ' ' + g.day +
      (g.year !== now.getFullYear() ? ', ' + g.year : '');

    html += '<div class="pending-group">' +
      '<div class="pending-date" onclick="goToDate(' + g.year + ',' + g.month + ',' + g.day + ')">' +
        '<span class="pending-date-label">' + dateStr + '</span>' +
        '<span class="pending-count-badge">' + g.tasks.length + '</span>' +
      '</div>';

    for (var c = 0; c < g.tasks.length; c++) {
      var pt = g.tasks[c];
      html += '<div class="pending-task-item">' +
        '<button class="check-btn" onclick="toggleTask(\'' + g.key + '\',' + pt.id + ')"></button>' +
        '<span class="pending-task-text">' + escHtml(pt.text) + '</span>' +
      '</div>';
    }

    html += '</div>';
  }

  html += '</div>';
  return html;
}

function escHtml(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── backup / export / import ── */
function toggleBackupPanel() {
  state.showBackup = !state.showBackup;
  if (state.showBackup) state.showHistory = false;
  render();
}
function exportBackup() {
  var data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    tasks: state.tasks,
    focusList: state.focusList,
    workouts: state.workouts,
    workoutDone: state.workoutDone,
    workoutCompletedAt: state.workoutCompletedAt,
    exerciseTags: state.exerciseTags
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var d = new Date();
  a.href = url;
  a.download = 'calendar-backup-' + d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + '.json';
  document.body.appendChild(a);
  a.click();
  setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
}
function importBackupFile() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!data.version || !data.tasks) { alert('Invalid backup file.'); return; }
        if (!confirm('This will replace ALL current data with the backup. Continue?')) return;
        state.tasks = data.tasks || {};
        state.focusList = data.focusList || [];
        state.workouts = data.workouts || [];
        state.workoutDone = data.workoutDone || {};
        state.workoutCompletedAt = data.workoutCompletedAt || {};
        state.exerciseTags = data.exerciseTags || [];
        saveTasks();
        saveFocusList();
        saveWorkouts();
        saveExerciseTags();
        state.showBackup = false;
        render();
        alert('Backup restored successfully!');
      } catch(err) { alert('Failed to read backup file.'); }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);
  input.click();
  setTimeout(function() { document.body.removeChild(input); }, 1000);
}
function renderBackupPanel() {
  var taskCount = Object.keys(state.tasks).reduce(function(n, k) { return n + state.tasks[k].length; }, 0);
  var doneCount = Object.keys(state.tasks).reduce(function(n, k) {
    return n + state.tasks[k].filter(function(t) { return t.done; }).length;
  }, 0);
  var workoutDoneCount = Object.keys(state.workoutDone).reduce(function(n, k) { return n + state.workoutDone[k].length; }, 0);
  return '<div class="backup-panel">' +
    '<h3>💾 Backup & Restore</h3>' +
    '<div class="backup-info" style="margin-bottom:10px;text-align:left;">' +
      '📋 Tasks: ' + taskCount + ' total (' + doneCount + ' done) &nbsp;|&nbsp; ' +
      '🏋️ Workouts: ' + state.workouts.length + ' saved, ' + workoutDoneCount + ' sessions logged' +
    '</div>' +
    '<div class="backup-row">' +
      '<button class="backup-action-btn primary" onclick="exportBackup()">⬇️ Export Backup</button>' +
      '<button class="backup-action-btn" onclick="importBackupFile()">⬆️ Import Backup</button>' +
    '</div>' +
    '<div class="backup-info">Export saves all tasks, workouts, checked items, focus list & exercise tags as a .json file.</div>' +
  '</div>';
}

function render() {
  var app = document.getElementById("app");
  var firstDay = new Date(state.year, state.month, 1).getDay();
  var daysInMonth = new Date(state.year, state.month + 1, 0).getDate();

  var selKey = state.selectedDate ? dateKey(state.year, state.month, state.selectedDate) : null;
  var selTasks = selKey ? (state.tasks[selKey] || []) : [];

  /* ── calendar cells ── */
  var calCells = "";
  for (var i = 0; i < firstDay; i++) calCells += '<div class="cal-cell empty"></div>';

  for (var d = 1; d <= daysInMonth; d++) {
    var key = dateKey(state.year, state.month, d);
    var dotsHtml = "";

    if (state.sportMode) {
      var dayWs = state.workouts.filter(function(ws) { return isWorkoutScheduledForDay(ws, state.year, state.month, d); });
      if (dayWs.length > 0) {
        var wDone = state.workoutDone[key] || [];
        for (var wi = 0; wi < dayWs.length; wi++) {
          var ws = dayWs[wi];
          var wIsDone = wDone.indexOf(ws.id) !== -1;
          var dc = ws.color ? ws.color : (wIsDone ? 'var(--teal)' : 'var(--purple)');
          var op = (ws.color && !wIsDone) ? '0.35' : '1';
          dotsHtml += '<div class="dot" style="background:' + dc + ';opacity:' + op + '"></div>';
        }
      }
    } else {
      var list = state.tasks[key] || [];
      var count = list.length;
      var doneCount = 0;
      for (var j = 0; j < list.length; j++) { if (list[j].done) doneCount++; }
      if (count > 0) {
        if (doneCount === count) dotsHtml = '<div class="dot" style="background:var(--teal)"></div>';
        else if (doneCount > 0) dotsHtml = '<div class="dot" style="background:var(--yellow)"></div>';
        else dotsHtml = '<div class="dot" style="background:var(--coral)"></div>';
      }
    }

    var cls = "cal-cell";
    if (isToday(d)) cls += " today";
    if (state.selectedDate === d) cls += " selected";

    calCells += '<div class="' + cls + '" onclick="selectDate(' + d + ')">' +
      d +
      '<div class="dot-row">' + dotsHtml + '</div>' +
      '</div>';
  }

  /* ── task panel ── */
  var taskPanel = "";
  if (state.sportMode) {
    taskPanel = renderSportDayPanel();
  } else if (state.selectedDate) {
    var dayName = DAYS_FULL[new Date(state.year, state.month, state.selectedDate).getDay()];
    var todayLabel = isToday(state.selectedDate) ? " \u00b7 Today" : "";

    var doneCount2 = 0;
    for (var k = 0; k < selTasks.length; k++) { if (selTasks[k].done) doneCount2++; }

    var badgeClass = "task-count-badge zero";
    var badgeText = "0 tasks";
    if (selTasks.length > 0) {
      badgeText = doneCount2 + "/" + selTasks.length;
      if (doneCount2 === selTasks.length) badgeClass = "task-count-badge all-done";
      else if (doneCount2 > 0) badgeClass = "task-count-badge some-done";
      else badgeClass = "task-count-badge none-done";
    }

    var taskItems = "";
    if (selTasks.length === 0) {
      taskItems = '<div class="empty-state"><div class="icon">✏️</div>No tasks yet — add one!</div>';
    } else {
      taskItems = '<div class="task-list">';
      for (var m = 0; m < selTasks.length; m++) {
        var t = selTasks[m];
        var isEditing = state.editingTask && state.editingTask.key === selKey && state.editingTask.id === t.id;
        if (isEditing) {
          taskItems +=
            '<div class="task-item editing">' +
              '<input id="editInput" class="task-edit-input" value="' + escAttr(t.text) + '" ' +
                'onkeydown="if(event.key===\'Enter\')saveEditTask();if(event.key===\'Escape\')cancelEditTask()" ' +
                'onblur="saveEditTask()">' +
            '</div>';
        } else {
          var itemCls = "task-item" + (t.done ? " task-done-item" : "");
          var doneDateLabel = '';
          if (t.done && t.completedDate && t.completedDate !== selKey) {
            var cdp = t.completedDate.split('-');
            doneDateLabel = '<span class="done-date">' + MONTHS[parseInt(cdp[1])-1].slice(0,3) + ' ' + parseInt(cdp[2]) + '</span>';
          }
          taskItems +=
            '<div class="' + itemCls + '"' +
              ' ontouchstart="taskLongPressStart(\'' + selKey + '\',' + t.id + ')"' +
              ' ontouchend="taskLongPressEnd()" ontouchmove="taskLongPressEnd()"' +
              ' ondblclick="startEditTask(\'' + selKey + '\',' + t.id + ')"' +
              ' oncontextmenu="return false">' +
              '<button class="check-btn ' + (t.done ? 'done' : '') + '" onclick="toggleTask(\'' + selKey + '\',' + t.id + ')">' +
                (t.done ? '&#10003;' : '') +
              '</button>' +
              '<span class="task-text ' + (t.done ? 'done' : '') + '">' + escHtml(t.text) + '</span>' +
              doneDateLabel +
              '<button class="pin-btn' + (isInFocus(selKey, t.id) ? ' active' : '') + '" onclick="addToFocus(\'' + selKey + '\',' + t.id + ')" title="' + (isInFocus(selKey, t.id) ? 'Remove from Focus' : 'Add to Today\'s Focus') + '">&#8853;</button>' +
              '<button class="del-btn" onclick="deleteTask(\'' + selKey + '\',' + t.id + ')">&#215;</button>' +
            '</div>';
        }
      }
      taskItems += '</div>';
    }

    taskPanel =
      '<div class="task-panel">' +
        '<div class="task-panel-head">' +
          '<div class="task-panel-head-left">' +
            '<h2>' + MONTHS[state.month] + ' ' + state.selectedDate + todayLabel + '</h2>' +
            '<div class="task-date-sub">' + dayName + '</div>' +
          '</div>' +
          '<span class="' + badgeClass + '">' + badgeText + '</span>' +
        '</div>' +
        '<div class="task-input-row">' +
          '<input id="taskInput" class="task-input" placeholder="Add a task..." ' +
            'onkeydown="if(event.key===\'Enter\')addTask()">' +
          '<button class="add-btn" onclick="addTask()">+</button>' +
        '</div>' +
        taskItems +
      '</div>';
  } else {
    taskPanel =
      '<div class="placeholder-panel">' +
        '<div class="icon">&#128197;</div>' +
        '<p>Pick a day to manage tasks</p>' +
        '<div class="sub">Tap any date on the calendar</div>' +
      '</div>';
  }

  /* ── day labels ── */
  var dayLabels = "";
  for (var n = 0; n < DAYS_SHORT.length; n++) {
    dayLabels += '<div class="day-label">' + DAYS_SHORT[n] + '</div>';
  }

  /* ── pending bar ── */
  var totalPending = 0;
  var pKeys = Object.keys(state.tasks);
  for (var p = 0; p < pKeys.length; p++) {
    var pList = state.tasks[pKeys[p]];
    for (var q = 0; q < pList.length; q++) { if (!pList[q].done) totalPending++; }
  }
  var focusValid = state.focusList.filter(function(fi) {
    var list = state.tasks[fi.key] || [];
    for (var fj = 0; fj < list.length; fj++) { if (list[fj].id === fi.taskId) return true; }
    return false;
  });
  var focusCount = focusValid.length;
  var focusDone = focusValid.filter(function(fi) {
    var list = state.tasks[fi.key] || [];
    for (var fj = 0; fj < list.length; fj++) { if (list[fj].id === fi.taskId && list[fj].done) return true; }
    return false;
  }).length;
  var focusBadge = '';
  if (focusCount > 0) {
    var fbCls = focusDone === focusCount ? 'pending-btn-count all-done' : (focusDone > 0 ? 'pending-btn-count some-done' : 'pending-btn-count');
    focusBadge = '<span class="' + fbCls + '">' + focusDone + '/' + focusCount + '</span>';
  }
  var pendingBar =
    '<div class="pending-bar">' +
      '<button class="pending-btn' + (state.showPending ? ' active' : '') + '" onclick="togglePending()">' +
        '📋 <span class="pending-btn-label">Pending</span>' +
        '<span class="pending-btn-count' + (totalPending === 0 ? ' zero' : '') + '">' + totalPending + '</span>' +
      '</button>' +
      '<button class="focus-bar-btn' + (state.showFocus ? ' active' : '') + '" onclick="toggleFocusView()" title="Today\'s Focus">&#128204;' + (focusBadge || '') + '</button>' +
      '<button class="focus-bar-btn' + (state.showHistory ? ' active' : '') + '" onclick="toggleHistory()" title="History">📜</button>' +
    '</div>';

  app.innerHTML =
    '<div class="header">' +
      '<button class="nav-btn" onclick="prevMonth()">&#9664;</button>' +
      '<div class="header-center">' +
        '<h1>' + MONTHS[state.month] + '<span>' + state.year + '</span></h1>' +
        (function() { var n = new Date(); return (state.month !== n.getMonth() || state.year !== n.getFullYear()) ? '<button class="today-btn" onclick="goToday()">Today</button>' : ''; })() +
      '</div>' +
      '<button class="nav-btn" onclick="nextMonth()">&#9654;</button>' +
    '</div>' +
    (!state.sportMode ? pendingBar : '') +
    (!state.sportMode && state.showPending ? renderPendingPanel() : '') +
    '<div class="sport-bar">' +
      '<button class="sport-btn' + (state.sportMode ? ' active' : '') + '" onclick="toggleSportMode()">🏋️ <span class="sport-btn-label">Sport Mode</span>' +
        (function() {
          if (state.sportMode) return '';
          var n = new Date();
          var todayWs = state.workouts.filter(function(w) { return isWorkoutScheduledForDay(w, n.getFullYear(), n.getMonth(), n.getDate()); });
          if (todayWs.length === 0) return '';
          var todayKey = dateKey(n.getFullYear(), n.getMonth(), n.getDate());
          var doneList = state.workoutDone[todayKey] || [];
          var done = todayWs.filter(function(w) { return doneList.indexOf(w.id) !== -1; }).length;
          var cls = done === todayWs.length ? 'task-count-badge all-done' : (done > 0 ? 'task-count-badge some-done' : 'task-count-badge none-done');
          return '<span class="' + cls + '">' + done + '/' + todayWs.length + '</span>';
        })() +
      '</button>' +
      (state.sportMode ? '<button class="sport-settings-btn' + (state.showSportSettings ? ' active' : '') + '" onclick="toggleSportSettings()">⚙️</button>' : '') +
      (state.sportMode ? '<button class="sport-settings-btn' + (state.showHistory ? ' active' : '') + '" onclick="toggleHistory()" title="History">📜</button>' : '') +
      '<button class="backup-btn' + (state.showBackup ? ' active' : '') + '" onclick="toggleBackupPanel()" title="Backup & Restore">💾</button>' +
    '</div>' +
    (state.sportMode && state.showSportSettings ? renderSportSettingsPanel() : '') +
    (state.showBackup ? renderBackupPanel() : '') +
    (state.showHistory ? renderHistoryPanel() : '') +
    '<div class="layout">' +
      '<div class="cal-side" ontouchstart="swipeTouchStart(event)" ontouchend="swipeTouchEnd(event)">' +
        '<div class="day-labels">' + dayLabels + '</div>' +
        '<div class="cal-grid">' + calCells + '</div>' +
      '</div>' +
      '<div class="task-side">' + (!state.sportMode && state.showFocus ? renderFocusPanel() : taskPanel) + '</div>' +
    '</div>';
}

// Auto-select today on startup
loadTasks();
loadWorkouts();
loadExerciseTags();
loadFocusList();
(function() {
  var t = new Date();
  state.year = t.getFullYear();
  state.month = t.getMonth();
  state.selectedDate = t.getDate();
  render();
})();
</script>
</body>
</html>
