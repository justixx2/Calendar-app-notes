<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Task Calendar</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c1017;
    --surface: #151b27;
    --surface2: #1c2435;
    --border: #252e3f;
    --text: #d8dee9;
    --text-dim: #5a6580;
    --accent: #5b9cf6;
    --accent-glow: rgba(91,156,246,0.15);
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --radius: 12px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #f0f4f8;
  }

  .header h1 span {
    font-weight: 400;
    color: var(--text-dim);
    margin-left: 6px;
  }

  .nav-btn {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); border-color: var(--accent); }
  .nav-btn:active { transform: scale(0.95); }

  .today-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 0;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .today-btn:hover { text-decoration: underline; }

  .header-center { text-align: center; }

  /* Layout */
  .layout {
    display: flex;
    gap: 24px;
  }

  .cal-side { flex: 1 1 420px; min-width: 0; }
  .task-side { flex: 1 1 300px; min-width: 280px; }

  /* Calendar Grid */
  .day-labels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
  }
  .day-label {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    padding: 8px 0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1px solid transparent;
    background: var(--surface);
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: all 0.12s;
    position: relative;
    font-family: 'JetBrains Mono', monospace;
  }
  .cal-cell:hover { background: var(--surface2); border-color: var(--border); }
  .cal-cell.today {
    color: var(--accent);
    font-weight: 700;
    background: var(--accent-glow);
    border-color: rgba(91,156,246,0.25);
  }
  .cal-cell.selected {
    border-color: var(--accent);
    background: rgba(91,156,246,0.12);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .cal-cell.empty {
    background: transparent;
    cursor: default;
  }

  .dot-row { display: flex; gap: 3px; height: 7px; }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  /* Task Panel */
  .task-panel {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 24px;
    position: sticky;
    top: 24px;
  }

  .task-panel h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
    color: #f0f4f8;
  }

  .task-date-sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  .task-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .task-input {
    flex: 1;
    padding: 11px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .task-input:focus { border-color: var(--accent); }
  .task-input::placeholder { color: var(--text-dim); }

  .add-btn {
    padding: 11px 18px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.12s;
  }
  .add-btn:hover { filter: brightness(1.1); }
  .add-btn:active { transform: scale(0.95); }

  .task-list { display: flex; flex-direction: column; gap: 8px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid var(--border);
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .check-btn {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--text-dim);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #fff;
    transition: all 0.15s;
  }
  .check-btn.done {
    border: none;
    background: var(--green);
  }

  .task-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
  }
  .task-text.done {
    text-decoration: line-through;
    color: var(--text-dim);
  }

  .del-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 18px;
    padding: 0 4px;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .task-item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 32px 0;
    color: var(--text-dim);
    font-size: 14px;
  }
  .empty-state .icon { font-size: 28px; margin-bottom: 8px; }

  .placeholder-panel {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 48px 24px;
    text-align: center;
    color: var(--text-dim);
  }
  .placeholder-panel .icon { font-size: 36px; margin-bottom: 12px; }
  .placeholder-panel p { font-size: 14px; }

  .task-count {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Responsive */
  @media (max-width: 700px) {
    .layout { flex-direction: column; }
    .task-side { min-width: 0; }
    .task-panel { position: static; }
    .app { padding: 16px 12px 32px; }
    .header h1 { font-size: 20px; }
    .cal-cell { font-size: 13px; border-radius: 8px; }
    .del-btn { opacity: 1; }
  }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DAYS_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

let state = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  selectedDate: null,
  tasks: {}
};

function loadTasks() {
  try {
    const saved = localStorage.getItem("task-calendar-data");
    if (saved) state.tasks = JSON.parse(saved);
  } catch(e) {}
}

function saveTasks() {
  try {
    localStorage.setItem("task-calendar-data", JSON.stringify(state.tasks));
  } catch(e) {}
}

function dateKey(y, m, d) {
  return y + "-" + String(m+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
}

function isToday(d) {
  const t = new Date();
  return d === t.getDate() && state.month === t.getMonth() && state.year === t.getFullYear();
}

function prevMonth() {
  if (state.month === 0) { state.month = 11; state.year--; } else state.month--;
  state.selectedDate = null;
  render();
}

function nextMonth() {
  if (state.month === 11) { state.month = 0; state.year++; } else state.month++;
  state.selectedDate = null;
  render();
}

function goToday() {
  const t = new Date();
  state.year = t.getFullYear();
  state.month = t.getMonth();
  state.selectedDate = t.getDate();
  render();
  setTimeout(function() { var el = document.getElementById("taskInput"); if(el) el.focus(); }, 50);
}

function selectDate(d) {
  state.selectedDate = d;
  render();
  setTimeout(function() { var el = document.getElementById("taskInput"); if(el) el.focus(); }, 50);
}

function addTask() {
  var input = document.getElementById("taskInput");
  var text = input.value.trim();
  if (!text || !state.selectedDate) return;
  var key = dateKey(state.year, state.month, state.selectedDate);
  if (!state.tasks[key]) state.tasks[key] = [];
  state.tasks[key].push({ text: text, done: false, id: Date.now() });
  saveTasks();
  input.value = "";
  render();
  setTimeout(function() { var el = document.getElementById("taskInput"); if(el) el.focus(); }, 50);
}

function toggleTask(key, id) {
  var list = state.tasks[key];
  if (!list) return;
  for (var i = 0; i < list.length; i++) {
    if (list[i].id === id) { list[i].done = !list[i].done; break; }
  }
  saveTasks();
  render();
}

function deleteTask(key, id) {
  if (!state.tasks[key]) return;
  state.tasks[key] = state.tasks[key].filter(function(x) { return x.id !== id; });
  if (state.tasks[key].length === 0) delete state.tasks[key];
  saveTasks();
  render();
}

function escHtml(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function render() {
  var app = document.getElementById("app");
  var firstDay = new Date(state.year, state.month, 1).getDay();
  var daysInMonth = new Date(state.year, state.month + 1, 0).getDate();

  var selKey = state.selectedDate ? dateKey(state.year, state.month, state.selectedDate) : null;
  var selTasks = selKey ? (state.tasks[selKey] || []) : [];

  var calCells = "";
  for (var i = 0; i < firstDay; i++) calCells += '<div class="cal-cell empty"></div>';

  for (var d = 1; d <= daysInMonth; d++) {
    var key = dateKey(state.year, state.month, d);
    var list = state.tasks[key] || [];
    var count = list.length;
    var doneCount = 0;
    for (var j = 0; j < list.length; j++) { if (list[j].done) doneCount++; }

    var dotColor = "";
    if (count > 0) {
      if (doneCount === count) dotColor = "var(--green)";
      else if (doneCount > 0) dotColor = "var(--yellow)";
      else dotColor = "var(--red)";
    }

    var cls = "cal-cell";
    if (isToday(d)) cls += " today";
    if (state.selectedDate === d) cls += " selected";

    calCells += '<div class="' + cls + '" onclick="selectDate(' + d + ')">' +
      d +
      '<div class="dot-row">' + (dotColor ? '<div class="dot" style="background:' + dotColor + '"></div>' : '') + '</div>' +
      '</div>';
  }

  var taskPanel = "";
  if (state.selectedDate) {
    var dayName = DAYS_FULL[new Date(state.year, state.month, state.selectedDate).getDay()];
    var todayBadge = isToday(state.selectedDate) ? " &middot; today" : "";
    var doneCount2 = 0;
    for (var k = 0; k < selTasks.length; k++) { if (selTasks[k].done) doneCount2++; }
    var countLabel = selTasks.length > 0 ? doneCount2 + "/" + selTasks.length + " done" : "";

    var taskItems = "";
    if (selTasks.length === 0) {
      taskItems = '<div class="empty-state"><div class="icon">✏️</div>No tasks yet — add one above</div>';
    } else {
      taskItems = '<div class="task-list">';
      for (var m = 0; m < selTasks.length; m++) {
        var t = selTasks[m];
        taskItems += '<div class="task-item">' +
          '<button class="check-btn ' + (t.done ? 'done' : '') + '" onclick="toggleTask(\'' + selKey + '\',' + t.id + ')">' + (t.done ? '✓' : '') + '</button>' +
          '<span class="task-text ' + (t.done ? 'done' : '') + '">' + escHtml(t.text) + '</span>' +
          '<button class="del-btn" onclick="deleteTask(\'' + selKey + '\',' + t.id + ')">×</button>' +
          '</div>';
      }
      taskItems += '</div>';
    }

    taskPanel = '<div class="task-panel">' +
      '<h2>' + MONTHS[state.month] + ' ' + state.selectedDate + '</h2>' +
      '<div class="task-date-sub">' + dayName + todayBadge + '</div>' +
      '<div class="task-input-row">' +
        '<input id="taskInput" class="task-input" placeholder="Add a task..." onkeydown="if(event.key===\'Enter\')addTask()">' +
        '<button class="add-btn" onclick="addTask()">+</button>' +
      '</div>' +
      (countLabel ? '<div class="task-count">' + countLabel + '</div>' : '') +
      taskItems +
      '</div>';
  } else {
    taskPanel = '<div class="placeholder-panel">' +
      '<div class="icon">📅</div>' +
      '<p>Click a day to view & add tasks</p>' +
      '</div>';
  }

  var dayLabels = "";
  for (var n = 0; n < DAYS_SHORT.length; n++) {
    dayLabels += '<div class="day-label">' + DAYS_SHORT[n] + '</div>';
  }

  app.innerHTML =
    '<div class="header">' +
      '<button class="nav-btn" onclick="prevMonth()">◀</button>' +
      '<div class="header-center">' +
        '<h1>' + MONTHS[state.month] + '<span>' + state.year + '</span></h1>' +
        '<button class="today-btn" onclick="goToday()">Today</button>' +
      '</div>' +
      '<button class="nav-btn" onclick="nextMonth()">▶</button>' +
    '</div>' +
    '<div class="layout">' +
      '<div class="cal-side">' +
        '<div class="day-labels">' + dayLabels + '</div>' +
        '<div class="cal-grid">' + calCells + '</div>' +
      '</div>' +
      '<div class="task-side">' + taskPanel + '</div>' +
    '</div>';
}

loadTasks();
render();
</script>
</body>
</html>
